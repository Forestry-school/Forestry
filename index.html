<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>謝師宴摸彩系統</title>

<style>

body{
    margin:0;
    background:#0d0d0d;
    color:white;
    font-family:Arial;
}

.container{
    display:flex;
    min-height:100vh;
}

.center{
    width:78%;
    padding:30px;
    text-align:center;
}

.right{
    width:22%;
    background:#1a1a1a;
    padding:20px;
    overflow:auto;
}

h1{
    color:gold;
    font-size:50px;
    margin-bottom:20px;
}

button{

    padding:15px 35px;

    border:none;

    border-radius:15px;

    cursor:pointer;

    font-size:22px;

    font-weight:bold;

    margin:15px;
}

#drawBtn{
    background:gold;
    color:black;
}

#resetBtn{
    background:crimson;
    color:white;
}

#slotContainer{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));

    gap:20px;

    margin-top:40px;
}

.slot-card{

    height:120px;

    border:4px solid gold;

    border-radius:20px;

    background:black;

    display:flex;

    justify-content:center;

    align-items:center;

    color:gold;

    font-size:36px;

    font-weight:bold;

    box-shadow:0 0 20px gold;
}

#winnerList{

    list-style:none;

    padding:0;
}

#winnerList li{

    font-size:28px;

    margin:10px 0;

    color:gold;
}

.allWinner{

    border-bottom:1px solid rgba(255,255,255,0.2);

    padding:10px 0;
}

</style>
</head>

<body>

<div class="container">

    <!-- 中間 -->
    <div class="center">

        <h1>🎰 謝師宴摸彩 🎰</h1>

        <button id="drawBtn">
            開始抽獎
        </button>

        <button id="resetBtn">
            重置所有抽獎
        </button>

        <div id="slotContainer"></div>

        <h2>🏆 本輪得獎者</h2>

        <ul id="winnerList"></ul>

    </div>

    <!-- 右邊 -->
    <div class="right">

        <h2>📜 所有得獎名單</h2>

        <div id="allWinnerList"></div>

    </div>

</div>

<script>

////////////////////////////////////////////////////////
// API
////////////////////////////////////////////////////////

const API_URL =
'https://script.google.com/macros/s/AKfycbyDm_9tAXT6vwCmqkpnLfecoukALyiVIRxkY5QubO3X8EMbbqIMmHnsG7p0AZza3q8/exec';

////////////////////////////////////////////////////////

let people = [];
let prizes = [];
let winners = [];

let currentPrizeIndex = 0;

////////////////////////////////////////////////////////
// 初始化
////////////////////////////////////////////////////////

async function init(){

    const response =
    await fetch(API_URL);

    const data =
    await response.json();

    people = data.people;

    prizes = data.prizes;

    winners = data.winners;

    findCurrentPrize();

    renderAllWinners();
}

////////////////////////////////////////////////////////
// 找目前獎項
////////////////////////////////////////////////////////

function findCurrentPrize(){

    let counter = {};

    winners.forEach(w=>{

        if(!counter[w.prize]){

            counter[w.prize] = 0;
        }

        counter[w.prize]++;
    });

    for(let i=0;i<prizes.length;i++){

        const prizeName =
        prizes[i]["獎項"];

        const total =
        parseInt(prizes[i]["人數"]);

        const current =
        counter[prizeName] || 0;

        if(current < total){

            currentPrizeIndex = i;

            break;
        }
    }
}

////////////////////////////////////////////////////////
// 顯示所有得獎名單
////////////////////////////////////////////////////////

function renderAllWinners(){

    const div =
    document.getElementById("allWinnerList");

    div.innerHTML = "";

    winners.forEach(w=>{

        div.innerHTML += `

            <div class="allWinner">

                🎉 ${w.prize}

                <br>

                ${w.name}

                (${w.unit})

            </div>
        `;
    });
}

////////////////////////////////////////////////////////
// 取得未中獎者
////////////////////////////////////////////////////////

function getAvailablePeople(){

    const winnerNames =
    winners.map(w=>w.name);

    return people.filter(
        p => !winnerNames.includes(p["姓名"])
    );
}

////////////////////////////////////////////////////////
// 顯示拉霸
////////////////////////////////////////////////////////

function renderRollingSlots(names){

    const container =
    document.getElementById("slotContainer");

    container.innerHTML = "";

    names.forEach(name=>{

        const div =
        document.createElement("div");

        div.className = "slot-card";

        div.innerText = name;

        container.appendChild(div);
    });
}

////////////////////////////////////////////////////////
// 抽獎
////////////////////////////////////////////////////////

async function drawLottery(){

    const drawBtn =
    document.getElementById("drawBtn");

    if(currentPrizeIndex >= prizes.length){

        alert("所有獎項已抽完");

        return;
    }

    drawBtn.disabled = true;

    const prize =
    prizes[currentPrizeIndex];

    const prizeName =
    prize["獎項"];

    const drawCount =
    parseInt(prize["人數"]);

    const available =
    getAvailablePeople();

    if(available.length < drawCount){

        alert("剩餘人數不足");

        drawBtn.disabled = false;

        return;
    }

    //////////////////////////////////////////////////////
    // 跑動動畫
    //////////////////////////////////////////////////////

    let rolling = setInterval(()=>{

        let tempPool = [...available];

        let rollingNames = [];

        for(let i=0;i<drawCount;i++){

            const randomIndex =
            Math.floor(
                Math.random() * tempPool.length
            );

            rollingNames.push(
                tempPool[randomIndex]["姓名"]
            );

            tempPool.splice(randomIndex,1);
        }

        renderRollingSlots(
            rollingNames
        );

    },80);

    //////////////////////////////////////////////////////
    // 停止
    //////////////////////////////////////////////////////

    setTimeout(async ()=>{

        clearInterval(rolling);

        let temp = [...available];

        let currentWinners = [];

        for(let i=0;i<drawCount;i++){

            const randomIndex =
            Math.floor(
                Math.random() * temp.length
            );

            const winner =
            temp[randomIndex];

            currentWinners.push(winner);

            temp.splice(randomIndex,1);
        }

        //////////////////////////////////////////////////////
        // 顯示最終得獎者
        //////////////////////////////////////////////////////

        const finalNames =
        currentWinners.map(
            w => `${w["姓名"]}`
        );

        renderRollingSlots(finalNames);

        //////////////////////////////////////////////////////
        // 顯示本輪
        //////////////////////////////////////////////////////

        const ul =
        document.getElementById("winnerList");

        ul.innerHTML = "";

        currentWinners.forEach(w=>{

            const li =
            document.createElement("li");

            li.innerText =
            `${w["姓名"]} (${w["單位"]})`;

            ul.appendChild(li);

            winners.push({

                prize:prizeName,

                unit:w["單位"],

                name:w["姓名"]
            });
        });

        //////////////////////////////////////////////////////
        // 寫回 Google Sheet
        //////////////////////////////////////////////////////

        await fetch(API_URL,{

            method:"POST",

            body:JSON.stringify({

                prize:prizeName,

                winners:currentWinners
            })
        });

        //////////////////////////////////////////////////////

        renderAllWinners();

        currentPrizeIndex++;

        drawBtn.disabled = false;

    },4000);
}

////////////////////////////////////////////////////////
// 重置
////////////////////////////////////////////////////////

async function resetLottery(){

    if(!confirm("確定要重置嗎？")){

        return;
    }

    await fetch(API_URL,{

        method:"POST",

        body:JSON.stringify({

            action:"reset"
        })
    });

    location.reload();
}

////////////////////////////////////////////////////////

document
.getElementById("drawBtn")
.addEventListener(
    "click",
    drawLottery
);

document
.getElementById("resetBtn")
.addEventListener(
    "click",
    resetLottery
);

////////////////////////////////////////////////////////

init();

</script>

</body>
</html>
