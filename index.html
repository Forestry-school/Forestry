<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 福瑞斯特謝師感恩餐會</title>
<style>
    /* ================= 基本設定 ================= */
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0;
        background: #000; color: white;
        font-family: "Microsoft JhengHei", sans-serif;
        display: flex; height: 100vh; overflow: hidden;
    }
    
    /* ================= 左側：主拉霸區 (80%) ================= */
    .left-panel {
        flex: 0 0 80%;
        display: flex; flex-direction: column; align-items: center;
        padding: 40px 20px; position: relative;
        border-right: 2px solid #222;
    }

    h1 {
        color: gold; font-size: clamp(35px, 5vw, 60px); margin: 0 0 20px 0;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.6); letter-spacing: 8px;
    }

    #drawBtn {
        padding: 25px 80px; border: none; border-radius: 20px;
        font-size: 36px; font-weight: bold; cursor: pointer; transition: all 0.2s;
        background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000;
        box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); margin-bottom: 25px;
    }
    #drawBtn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 215, 0, 0.6); }
    #drawBtn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }

    #currentPrize {
        color: #fff; font-size: 38px; margin-bottom: 30px;
        background: rgba(255, 215, 0, 0.1); padding: 15px 60px;
        border-radius: 50px; border: 3px solid gold; font-weight: bold;
    }

    /* 滿版 5 欄網格 */
    .slot-machine-container {
        width: 100%; max-width: 1400px; padding: 30px;
        background: #111; border-radius: 30px; border: 6px solid #222;
        box-shadow: inset 0 0 60px #000;
    }

    #slotMachine {
        display: grid; 
        grid-template-columns: repeat(5, 1fr); /* 嚴格固定 5 欄 */
        gap: 20px; 
    }

    .reel {
        height: 150px; overflow: hidden; border-radius: 15px; position: relative;
        background: linear-gradient(to bottom, #ffffff 0%, #cfcfcf 50%, #ffffff 100%);
        border: 4px solid #000;
    }
    
    .reel::after {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 35%, transparent 65%, rgba(0,0,0,0.7) 100%);
        pointer-events: none; z-index: 2;
    }

    .reel-inner { display: flex; flex-direction: column; }
    .slot-name {
        width: 100%; height: 150px; display: flex; align-items: center;
        justify-content: center; text-align: center; 
        font-size: 36px; font-weight: 900; color: #111;
    }
    .slot-winner-name { color: #e60000; font-size: 42px; text-shadow: 1px 1px 0px rgba(255,255,255,0.5); }

    /* ================= 右側：榮譽得獎榜 (20%) ================= */
    .right-panel {
        flex: 0 0 20%; background: #0a0a0a; padding: 30px 20px; overflow-y: auto;
    }
    .right-panel h2 {
        color: gold; font-size: 28px; border-bottom: 3px solid gold;
        padding-bottom: 15px; margin-top: 0; text-align: center;
    }
    .allWinner { padding: 20px 0; border-bottom: 1px solid #222; }
    .prize-title { color: gold; font-size: 20px; font-weight: bold; margin-bottom: 10px; }
    .prize-names { color: #ddd; font-size: 18px; line-height: 1.6; }

    /* ================= 控制區域 ================= */
    .controls {
        position: fixed; bottom: 30px; left: 30px;
        display: flex; flex-direction: column; gap: 15px;
    }
    #nextPrizeBtn {
        background: #0088cc; color: white; border: none; padding: 18px 35px;
        border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer;
        box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
    #nextPrizeBtn:disabled { background: #222; color: #555; }

    #resetBtn {
        background: transparent; color: #333; border: 1px solid #222;
        padding: 8px 15px; border-radius: 6px; font-size: 13px; cursor: pointer;
        width: fit-content; transition: 0.3s;
    }
    #resetBtn:hover { color: #ff4d4d; border-color: #ff4d4d; }

</style>
</head>
<body>

    <div class="controls">
        <button id="nextPrizeBtn" disabled>讀取名單中...</button>
        <button id="resetBtn">🔄 系統重置</button>
    </div>

    <div class="left-panel">
        <h1>🎰 福瑞斯特謝師感恩餐會</h1>
        
        <button id="drawBtn" disabled>等待鎖定獎項</button>
        
        <div id="currentPrize">請先點擊「鎖定下個獎項」</div>

        <div class="slot-machine-container">
            <div id="slotMachine"></div>
        </div>
    </div>

    <div class="right-panel">
        <h2>📜 榮譽得獎榜</h2>
        <div id="allWinnerList"></div>
    </div>

    <audio id="spinSound" preload="auto">
        <source src="souce.m4a" type="audio/mp4">
    </audio>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyDm_9tAXT6vwCmqkpnLfecoukALyiVIRxkY5QubO3X8EMbbqIMmHnsG7p0AZza3q8/exec';

    let people = [];
    let prizes = [];
    let winners = [];
    let currentPrizeIndex = -1;
    let isDataLoaded = false;
    const SLOT_HEIGHT = 150; 
    const TOTAL_FAKE_NAMES = 65; 

    async function init() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            people = data.people;
            prizes = data.prizes;
            winners = data.winners;
            isDataLoaded = true;
            document.getElementById("nextPrizeBtn").disabled = false;
            document.getElementById("nextPrizeBtn").innerText = "🔍 鎖定下個獎項";
            renderAllWinners();
        } catch (e) {
            document.getElementById("currentPrize").innerText = "❌ 連線失敗";
        }
    }

    function renderAllWinners() {
        const div = document.getElementById("allWinnerList");
        div.innerHTML = "";
        let grouped = {};
        winners.forEach(w => {
            if (!grouped[w.prize]) grouped[w.prize] = [];
            grouped[w.prize].push(w.name);
        });
        Object.keys(grouped).forEach(prize => {
            div.innerHTML += `<div class="allWinner"><div class="prize-title">🎉 ${prize}</div><div class="prize-names">${grouped[prize].join("、")}</div></div>`;
        });
    }

    function prepareNextPrize() {
        if (!isDataLoaded) return;
        let counter = {};
        winners.forEach(w => {
            if (!counter[w.prize]) counter[w.prize] = 0;
            counter[w.prize]++;
        });

        let found = false;
        for (let i = 0; i < prizes.length; i++) {
            const prizeName = prizes[i]["獎項"];
            const total = parseInt(prizes[i]["人數"]);
            const current = counter[prizeName] || 0;
            if (current < total) {
                currentPrizeIndex = i;
                found = true;
                break;
            }
        }

        const display = document.getElementById("currentPrize");
        const drawBtn = document.getElementById("drawBtn");
        const nextBtn = document.getElementById("nextPrizeBtn");

        if (found) {
            const prize = prizes[currentPrizeIndex];
            display.innerText = `🎁 目前抽：${prize["獎項"]} (${prize["人數"]}人)`;
            drawBtn.disabled = false;
            drawBtn.innerText = "🎰 啟動拉霸，好運降臨！";
            nextBtn.disabled = true; 
            document.getElementById("slotMachine").innerHTML = ""; 
        } else {
            display.innerText = "🎉 抽獎全部結束！";
            drawBtn.disabled = true;
            nextBtn.disabled = true;
        }
    }

    function createSlot(nameList, winnerData) {
        const reel = document.createElement("div");
        reel.className = "reel";
        const inner = document.createElement("div");
        inner.className = "reel-inner";
        for (let i = 0; i < TOTAL_FAKE_NAMES; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            inner.innerHTML += `<div class="slot-name">${random ? random["姓名"] : "?"}</div>`;
        }
        inner.innerHTML += `<div class="slot-name slot-winner-name">${winnerData["姓名"]}</div>`;
        for (let i = 0; i < 3; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            inner.innerHTML += `<div class="slot-name">${random ? random["姓名"] : "?"}</div>`;
        }
        reel.appendChild(inner);
        return { reel, inner };
    }

    async function drawLottery() {
        const drawBtn = document.getElementById("drawBtn");
        drawBtn.disabled = true;
        drawBtn.innerText = "🚀 好運運轉中...";

        const prize = prizes[currentPrizeIndex];
        const winnerNames = winners.map(w => w.name);
        const available = people.filter(p => !winnerNames.includes(p["姓名"]));
        const drawCount = Math.min(parseInt(prize["人數"]), available.length);

        const spinSound = document.getElementById("spinSound");
        spinSound.currentTime = 0;
        spinSound.play();

        let currentWinners = [];
        let temp = [...available];
        for (let i = 0; i < drawCount; i++) {
            const idx = Math.floor(Math.random() * temp.length);
            currentWinners.push(temp[idx]);
            temp.splice(idx, 1);
        }

        const machine = document.getElementById("slotMachine");
        machine.innerHTML = "";
        let slots = [];
        for (let i = 0; i < drawCount; i++) {
            const slot = createSlot(available, currentWinners[i]);
            machine.appendChild(slot.reel);
            slots.push(slot);
        }

        void machine.offsetWidth; 
        const targetY = -(TOTAL_FAKE_NAMES * SLOT_HEIGHT);

        slots.forEach((slot, index) => {
            slot.inner.style.transition = `transform 8s cubic-bezier(0.15, 0, 0.15, 1)`;
            slot.inner.style.transform = `translateY(${targetY}px)`;
        });

        setTimeout(async () => {
            // 停止音效
            spinSound.pause();
            spinSound.currentTime = 0;

            currentWinners.forEach(w => {
                winners.push({ prize: prize["獎項"], name: w["姓名"] });
            });
            renderAllWinners();
            
            fetch(API_URL, { method: "POST", body: JSON.stringify({ prize: prize["獎項"], winners: currentWinners }) });
            
            document.getElementById("nextPrizeBtn").disabled = false;
            drawBtn.innerText = "開獎完畢";
        }, 8000); 
    }

    async function resetLottery() {
        if (!confirm("確定要重置？這會清除所有紀錄！")) return;
        await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "reset" }) });
        location.reload();
    }

    document.getElementById("nextPrizeBtn").addEventListener("click", prepareNextPrize);
    document.getElementById("drawBtn").addEventListener("click", drawLottery);
    document.getElementById("resetBtn").addEventListener("click", resetLottery);
    init();
</script>
</body>
</html>
