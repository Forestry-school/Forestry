<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 福瑞斯特謝師感恩餐會</title>
<style>
    /* ================= 基本設定 ================= */
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0;
        background: #0a0a0a; color: white;
        font-family: "Microsoft JhengHei", sans-serif;
        display: flex; min-height: 100vh; overflow-x: hidden;
    }
    
    /* ================= 左側主畫面 ================= */
    .main-panel {
        flex: 1; padding: 40px 2%;
        display: flex; flex-direction: column; align-items: center;
        margin-right: 20%; /* 預留給右側榜單 */
        min-width: 0;
    }

    h1 {
        color: gold; font-size: 52px; margin: 0 0 20px 0;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.6); letter-spacing: 4px;
    }

    /* 中間的大啟動按鈕 */
    #drawBtn {
        padding: 20px 60px; border: none; border-radius: 15px;
        font-size: 32px; font-weight: bold; cursor: pointer; transition: all 0.2s;
        background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000;
        box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        margin-bottom: 25px;
    }
    #drawBtn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 215, 0, 0.5); }
    #drawBtn:active { transform: scale(0.95); }
    #drawBtn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }

    /* ================= 左下角控制區 ================= */
    .left-controls {
        position: fixed; bottom: 20px; left: 20px;
        display: flex; flex-direction: column; gap: 10px;
        z-index: 100;
    }

    #nextPrizeBtn {
        background: #2a5298; color: white; border: none; padding: 12px 25px;
        border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer;
    }
    #nextPrizeBtn:disabled { background: #222; color: #555; }

    #resetBtn {
        background: transparent; color: #444; border: 1px solid #333;
        padding: 8px 15px; border-radius: 5px; font-size: 14px; cursor: pointer;
        transition: 0.3s;
    }
    #resetBtn:hover { color: #ff4d4d; border-color: #ff4d4d; }

    #currentPrize {
        color: #fff; font-size: 32px; margin-bottom: 25px;
        background: rgba(255, 215, 0, 0.1); padding: 15px 40px;
        border-radius: 40px; border: 2px solid gold; font-weight: bold;
        min-height: 70px; display: flex; align-items: center; text-align: center;
    }

    /* ================= 拉霸網格系統 ================= */
    .slot-machine-container {
        background: #111; padding: 25px; border-radius: 20px; border: 5px solid #222;
        box-shadow: inset 0 0 40px #000; width: 100%;
    }

    #slotMachine {
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 12px; justify-content: center;
    }

    .reel {
        height: 100px; box-sizing: border-box; overflow: hidden; border-radius: 8px; position: relative;
        background: linear-gradient(to bottom, #ffffff 0%, #d0d0d0 50%, #ffffff 100%);
        border: 3px solid #000; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    
    .reel::after {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.7) 100%);
        pointer-events: none; z-index: 2;
    }

    .reel-inner { display: flex; flex-direction: column; }
    .slot-name {
        width: 100%; height: 100px; display: flex; align-items: center;
        justify-content: center; text-align: center; padding: 0 5px;
        font-size: 24px; font-weight: 800; color: #222; white-space: nowrap; overflow: hidden;
    }
    .slot-winner-name { color: #d00000; font-size: 28px; text-shadow: 1px 1px 0px rgba(255,255,255,0.8); }

    /* ================= 右側榜單 ================= */
    .right-panel {
        position: fixed; right: 0; top: 0; width: 20%; height: 100vh;
        overflow-y: auto; background: #111; border-left: 3px solid #333; padding: 30px 20px;
    }
    .right-panel h2 { color: gold; font-size: 24px; border-bottom: 2px solid gold; padding-bottom: 10px; margin-top: 0; }
    .allWinner { padding: 12px 0; border-bottom: 1px solid #222; }
    .prize-title { color: gold; font-size: 18px; margin-bottom: 5px; font-weight: bold; }
    .prize-names { color: #ccc; line-height: 1.5; font-size: 16px; word-break: break-all; }

</style>
</head>
<body>

    <div class="left-controls">
        <button id="nextPrizeBtn" disabled>讀取資料中...</button>
        <button id="resetBtn">🔄 系統重置</button>
    </div>

    <div class="main-panel">
        <h1>🎰 福瑞斯特謝師感恩餐會</h1>

        <button id="drawBtn" disabled>等待獎項</button>

        <div id="currentPrize">準備中...</div>

        <div class="slot-machine-container">
            <div id="slotMachine"></div>
        </div>
    </div>

    <div class="right-panel">
        <h2>📜 榮譽得獎榜单</h2>
        <div id="allWinnerList"></div>
    </div>

    <audio id="spinSound" preload="auto">
        <source src="souce.m4a" type="audio/mp4">
    </audio>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyDm_9tAXT6vwCmqkpnLfecoukALyiVIRxkY5QubO3X8EMbbqIMmHnsG7p0AZza3q8/exec';

    let people = [];
    let prizes = [];
    let winners = [];
    let currentPrizeIndex = -1;
    let isDataLoaded = false;

    const SLOT_HEIGHT = 100; 
    const TOTAL_FAKE_NAMES = 65; 

    async function init() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            people = data.people;
            prizes = data.prizes;
            winners = data.winners;
            isDataLoaded = true;
            document.getElementById("nextPrizeBtn").disabled = false;
            document.getElementById("nextPrizeBtn").innerText = "🔍 鎖定下個獎項";
            document.getElementById("currentPrize").innerText = "資料已更新，請鎖定獎項";
            renderAllWinners();
        } catch (e) {
            document.getElementById("currentPrize").innerText = "❌ 連線失敗";
        }
    }

    function renderAllWinners() {
        const div = document.getElementById("allWinnerList");
        div.innerHTML = "";
        let grouped = {};
        winners.forEach(w => {
            if (!grouped[w.prize]) grouped[w.prize] = [];
            grouped[w.prize].push(w.name);
        });
        Object.keys(grouped).forEach(prize => {
            div.innerHTML += `
                <div class="allWinner">
                    <div class="prize-title">🎉 ${prize}</div>
                    <div class="prize-names">${grouped[prize].join("、")}</div>
                </div>
            `;
        });
    }

    function prepareNextPrize() {
        if (!isDataLoaded) return;
        let counter = {};
        winners.forEach(w => {
            if (!counter[w.prize]) counter[w.prize] = 0;
            counter[w.prize]++;
        });

        let found = false;
        for (let i = 0; i < prizes.length; i++) {
            const prizeName = prizes[i]["獎項"];
            const total = parseInt(prizes[i]["人數"]);
            const current = counter[prizeName] || 0;
            if (current < total) {
                currentPrizeIndex = i;
                found = true;
                break;
            }
        }

        const display = document.getElementById("currentPrize");
        const drawBtn = document.getElementById("drawBtn");
        const nextBtn = document.getElementById("nextPrizeBtn");

        if (found) {
            const prize = prizes[currentPrizeIndex];
            display.innerText = `🎁 目前抽：${prize["獎項"]} (${prize["人數"]}人)`;
            drawBtn.disabled = false;
            drawBtn.innerText = "🎰 啟動拉霸機";
            nextBtn.disabled = true; 
            document.getElementById("slotMachine").innerHTML = ""; 
        } else {
            display.innerText = "🎉 抽獎結束！明年再見！";
            drawBtn.disabled = true;
            drawBtn.innerText = "完抽";
            nextBtn.disabled = true;
        }
    }

    function createSlot(nameList, winnerData) {
        const reel = document.createElement("div");
        reel.className = "reel";
        const inner = document.createElement("div");
        inner.className = "reel-inner";
        for (let i = 0; i < TOTAL_FAKE_NAMES; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            inner.innerHTML += `<div class="slot-name">${random ? random["姓名"] : "?"}</div>`;
        }
        inner.innerHTML += `<div class="slot-name slot-winner-name">${winnerData["姓名"]}</div>`;
        for (let i = 0; i < 3; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            inner.innerHTML += `<div class="slot-name">${random ? random["姓名"] : "?"}</div>`;
        }
        reel.appendChild(inner);
        return { reel, inner };
    }

    async function drawLottery() {
        const drawBtn = document.getElementById("drawBtn");
        drawBtn.disabled = true;
        drawBtn.innerText = "🚀 正在開獎...";

        const prize = prizes[currentPrizeIndex];
        const winnerNames = winners.map(w => w.name);
        const available = people.filter(p => !winnerNames.includes(p["姓名"]));
        const drawCount = Math.min(parseInt(prize["人數"]), available.length);

        if (drawCount === 0) return;

        const spinSound = document.getElementById("spinSound");
        spinSound.currentTime = 0;
        spinSound.play();

        let temp = [...available];
        let currentWinners = [];
        for (let i = 0; i < drawCount; i++) {
            const randomIndex = Math.floor(Math.random() * temp.length);
            currentWinners.push(temp[randomIndex]);
            temp.splice(randomIndex, 1);
        }

        const machine = document.getElementById("slotMachine");
        machine.innerHTML = "";
        let slots = [];
        for (let i = 0; i < drawCount; i++) {
            const slot = createSlot(available, currentWinners[i]);
            machine.appendChild(slot.reel);
            slots.push(slot);
        }

        void machine.offsetWidth; 
        const targetY = -(TOTAL_FAKE_NAMES * SLOT_HEIGHT);

        slots.forEach((slot, index) => {
            const step = drawCount > 1 ? (2.5 / (drawCount - 1)) : 0;
            const duration = 5.5 + (index * step); 
            slot.inner.style.transition = `transform ${duration}s cubic-bezier(0.1, 0.8, 0.1, 1.1)`;
            slot.inner.style.transform = `translateY(${targetY}px)`;
        });

        setTimeout(async () => {
            spinSound.pause();
            currentWinners.forEach(w => {
                winners.push({ prize: prize["獎項"], name: w["姓名"] });
            });
            renderAllWinners();
            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ prize: prize["獎項"], winners: currentWinners })
            });
            document.getElementById("nextPrizeBtn").disabled = false;
            drawBtn.innerText = "開獎完畢";
        }, 8300); 
    }

    async function resetLottery() {
        if (!confirm("確定要重置嗎？這將清除雲端所有紀錄喔！")) return;
        await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "reset" }) });
        location.reload();
    }

    document.getElementById("nextPrizeBtn").addEventListener("click", prepareNextPrize);
    document.getElementById("drawBtn").addEventListener("click", drawLottery);
    document.getElementById("resetBtn").addEventListener("click", resetLottery);
    init();
</script>
</body>
</html>
