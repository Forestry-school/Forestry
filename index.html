<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 福瑞斯特謝師感恩餐會 - 節奏控制版</title>
<style>
    /* ================= 基本設定 ================= */
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0;
        background: #0a0a0a; color: white;
        font-family: "Microsoft JhengHei", sans-serif;
        display: flex; min-height: 100vh; overflow-x: hidden;
    }
    
    /* ================= 左側主畫面 ================= */
    .main-panel {
        flex: 1; padding: 40px 2%;
        display: flex; flex-direction: column; align-items: center;
        margin-right: 20%; min-width: 0;
    }

    h1 {
        color: gold; font-size: 56px; margin: 0 0 30px 0;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.6); letter-spacing: 5px;
    }

    .btn-group {
        display: flex; gap: 20px; margin-bottom: 30px;
    }

    button {
        padding: 20px 40px; border: none; border-radius: 15px;
        font-size: 24px; font-weight: bold; cursor: pointer; transition: all 0.2s;
    }
    button:active { transform: scale(0.95); }
    
    /* 準備獎項按鈕：藍色 */
    #nextPrizeBtn { background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: white; box-shadow: 0 6px 15px rgba(0, 210, 255, 0.3); }
    #nextPrizeBtn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }

    /* 開始抽獎按鈕：金色 */
    #drawBtn { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4); }
    #drawBtn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }

    #resetBtn { background: #444; color: #ccc; font-size: 16px; padding: 10px 20px; }

    #currentPrize {
        color: #fff; font-size: 36px; margin-bottom: 35px;
        background: rgba(255, 215, 0, 0.1); padding: 15px 50px;
        border-radius: 60px; border: 3px solid gold; font-weight: bold;
        min-height: 80px; display: flex; align-items: center;
    }

    /* ================= 核心：滿版拉霸機台 ================= */
    .slot-machine-container {
        background: #151515; padding: 30px; 
        border-radius: 25px; border: 8px solid #222;
        box-shadow: inset 0 0 50px #000, 0 15px 50px rgba(0,0,0,0.9);
        width: 98%; margin-bottom: 50px;
    }

    #slotMachine {
        display: grid; grid-template-columns: repeat(5, 1fr);
        gap: 25px; margin: 0 auto;
    }

    .reel {
        width: 100%; height: 140px; box-sizing: border-box; 
        overflow: hidden; border-radius: 12px; position: relative;
        background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 50%, #ffffff 100%);
        border: 4px solid #000; box-shadow: 0 5px 15px rgba(0,0,0,0.6);
    }
    
    .reel::after {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 25%, transparent 75%, rgba(0,0,0,0.8) 100%);
        pointer-events: none; z-index: 2;
    }

    .reel-inner { display: flex; flex-direction: column; }

    .slot-name {
        width: 100%; height: 140px; display: flex; align-items: center;
        justify-content: center; text-align: center; padding: 0 10px;
        font-size: 36px; font-weight: 900; color: #111; white-space: nowrap;
    }

    .slot-winner-name { color: #e60000; font-size: 42px; text-shadow: 1px 1px 0px rgba(255,255,255,0.8); }

    /* ================= 下方名單區 ================= */
    h2 { color: #00e5ff; font-size: 32px; margin-top: 30px; }
    #winnerList { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 50px; }
    .winner-item {
        background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05));
        border: 2px solid gold; border-radius: 15px; padding: 12px 30px;
        color: gold; font-size: 30px; font-weight: bold;
    }

    #remainList { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; opacity: 0.6; }
    .remain-item { padding: 8px 16px; background: #111; border: 1px solid #333; border-radius: 8px; color: #888; font-size: 16px; }

    /* ================= 右側：全部得獎名單 ================= */
    .right-panel {
        position: fixed; right: 0; top: 0; width: 20%; height: 100vh;
        overflow-y: auto; background: #111; border-left: 3px solid #333; padding: 30px 20px;
    }
    .right-panel h2 { color: gold; font-size: 26px; border-bottom: 2px solid gold; padding-bottom: 15px; margin-top: 0; text-align: left; }
    .allWinner { padding: 18px 0; border-bottom: 1px solid #222; }
    .prize-title { color: gold; font-size: 22px; margin-bottom: 10px; font-weight: bold; }
    .prize-names { color: #ccc; line-height: 1.8; font-size: 18px; }

</style>
</head>
<body>

    <div class="main-panel">
        <h1>🎰 福瑞斯特謝師感恩餐會 🎰</h1>

        <div class="btn-group">
            <button id="nextPrizeBtn">準備下一個獎項</button>
            <button id="drawBtn" disabled>開始抽獎</button>
            <button id="resetBtn">重置</button>
        </div>

        <div id="currentPrize">請先點擊「準備下一個獎項」</div>

        <div class="slot-machine-container">
            <div id="slotMachine"></div>
        </div>

        <h2 class="winner-title">🏆 本輪得獎者</h2>
        <div id="winnerList"></div>

        <h2 class="remain-title">🎯 尚未抽中名單</h2>
        <div id="remainList"></div>
    </div>

    <div class="right-panel">
        <h2>📜 榮譽得獎榜</h2>
        <div id="allWinnerList"></div>
    </div>

    <audio id="spinSound" preload="auto">
        <source src="souce.m4a" type="audio/mp4">
    </audio>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyDm_9tAXT6vwCmqkpnLfecoukALyiVIRxkY5QubO3X8EMbbqIMmHnsG7p0AZza3q8/exec';

    let people = [];
    let prizes = [];
    let winners = [];
    let currentPrizeIndex = -1; // 初始設為 -1，表示還沒點準備獎項

    const SLOT_HEIGHT = 140; 
    const TOTAL_FAKE_NAMES = 30; 

    async function init() {
        const response = await fetch(API_URL);
        const data = await response.json();
        people = data.people;
        prizes = data.prizes;
        winners = data.winners;

        renderAllWinners();
        renderRemainList();
    }

    // 點擊「下一個獎項」才去計算該抽什麼
    function prepareNextPrize() {
        let counter = {};
        winners.forEach(w => {
            if (!counter[w.prize]) counter[w.prize] = 0;
            counter[w.prize]++;
        });

        let found = false;
        for (let i = 0; i < prizes.length; i++) {
            const prizeName = prizes[i]["獎項"];
            const total = parseInt(prizes[i]["人數"]);
            const current = counter[prizeName] || 0;
            if (current < total) {
                currentPrizeIndex = i;
                found = true;
                break;
            }
        }

        const display = document.getElementById("currentPrize");
        const drawBtn = document.getElementById("drawBtn");
        const nextBtn = document.getElementById("nextPrizeBtn");

        if (found) {
            const prize = prizes[currentPrizeIndex];
            display.innerText = `🎁 目前抽：${prize["獎項"]} (${prize["人數"]}人)`;
            drawBtn.disabled = false; // 啟動抽獎按鈕
            nextBtn.disabled = true;  // 鎖定自己，避免重複點
            document.getElementById("slotMachine").innerHTML = ""; // 清空上一輪方塊
            document.getElementById("winnerList").innerHTML = "";  // 清空上一輪名單
        } else {
            display.innerText = "🎉 所有獎項已全部抽完！";
            drawBtn.disabled = true;
            nextBtn.disabled = true;
        }
    }

    function getAvailablePeople() {
        const winnerNames = winners.map(w => w.name);
        return people.filter(p => !winnerNames.includes(p["姓名"]));
    }

    function renderRemainList() {
        const remain = getAvailablePeople();
        const div = document.getElementById("remainList");
        div.innerHTML = "";
        remain.forEach(person => {
            div.innerHTML += `<div class="remain-item">${person["姓名"]}</div>`;
        });
    }

    function renderAllWinners() {
        const div = document.getElementById("allWinnerList");
        div.innerHTML = "";
        let grouped = {};
        winners.forEach(w => {
            if (!grouped[w.prize]) grouped[w.prize] = [];
            grouped[w.prize].push(w.name);
        });

        Object.keys(grouped).forEach(prize => {
            div.innerHTML += `
                <div class="allWinner">
                    <div class="prize-title">🎉 ${prize}</div>
                    <div class="prize-names">${grouped[prize].join("、")}</div>
                </div>
            `;
        });
    }

    function createSlot(nameList, winnerData) {
        const reel = document.createElement("div");
        reel.className = "reel";
        const inner = document.createElement("div");
        inner.className = "reel-inner";

        for (let i = 0; i < TOTAL_FAKE_NAMES; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            const nameStr = random ? random["姓名"] : "?";
            inner.innerHTML += `<div class="slot-name">${nameStr}</div>`;
        }

        inner.innerHTML += `<div class="slot-name slot-winner-name">${winnerData["姓名"]}</div>`;

        for (let i = 0; i < 3; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            const nameStr = random ? random["姓名"] : "?";
            inner.innerHTML += `<div class="slot-name">${nameStr}</div>`;
        }

        reel.appendChild(inner);
        return { reel, inner };
    }

    async function drawLottery() {
        const drawBtn = document.getElementById("drawBtn");
        drawBtn.disabled = true; // 按下後立刻鎖死，防止連按

        const prize = prizes[currentPrizeIndex];
        const available = getAvailablePeople();
        const drawCount = Math.min(parseInt(prize["人數"]), available.length);

        if (drawCount === 0) {
            alert("名額已滿！");
            return;
        }

        const spinSound = document.getElementById("spinSound");
        spinSound.currentTime = 0;
        spinSound.play();

        let temp = [...available];
        let currentWinners = [];
        for (let i = 0; i < drawCount; i++) {
            const randomIndex = Math.floor(Math.random() * temp.length);
            currentWinners.push(temp[randomIndex]);
            temp.splice(randomIndex, 1);
        }

        const machine = document.getElementById("slotMachine");
        machine.innerHTML = "";
        let slots = [];

        for (let i = 0; i < drawCount; i++) {
            const slot = createSlot(available, currentWinners[i]);
            machine.appendChild(slot.reel);
            slots.push(slot);
        }

        void machine.offsetWidth; 

        const targetY = -(TOTAL_FAKE_NAMES * SLOT_HEIGHT);
        let maxSpinTime = 0;
        const staggerDelay = 0.3; 

        slots.forEach((slot, index) => {
            const duration = 3 + (index * staggerDelay);
            if (duration > maxSpinTime) maxSpinTime = duration;
            slot.inner.style.transition = `transform ${duration}s cubic-bezier(0.1, 0.8, 0.1, 1.15)`;
            slot.inner.style.transform = `translateY(${targetY}px)`;
        });

        setTimeout(async () => {
            spinSound.pause();
            spinSound.currentTime = 0;

            const winnerList = document.getElementById("winnerList");
            winnerList.innerHTML = "";

            currentWinners.forEach(w => {
                winnerList.innerHTML += `<div class="winner-item">${w["姓名"]}</div>`;
                winners.push({ prize: prize["獎項"], name: w["姓名"] });
            });

            // 回傳資料
            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({
                    prize: prize["獎項"],
                    winners: currentWinners
                })
            });

            renderAllWinners();
            renderRemainList();
            
            // 重要：抽完後，要把「下一個」按鈕亮起來，讓主持人點
            document.getElementById("nextPrizeBtn").disabled = false;

        }, maxSpinTime * 1000 + 400);
    }

    async function resetLottery() {
        if (!confirm("確定重置所有資料嗎？")) return;
        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "reset" })
        });
        location.reload();
    }

    document.getElementById("nextPrizeBtn").addEventListener("click", prepareNextPrize);
    document.getElementById("drawBtn").addEventListener("click", drawLottery);
    document.getElementById("resetBtn").addEventListener("click", resetLottery);

    init();
</script>
</body>
</html>
