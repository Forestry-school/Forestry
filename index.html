<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>🎰 真實拉霸摸彩系統</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>
        🎰 謝師宴拉霸摸彩 🎰
    </h1>

    <div class="btn-group">

        <button id="drawBtn">
            開始抽獎
        </button>

        <button id="resetBtn">
            重置所有抽獎
        </button>

    </div>

    <div id="currentPrize"></div>

    <!-- 拉霸區 -->
    <div id="slotMachine"></div>

    <!-- 本輪得獎 -->
    <h2 class="winner-title">
        🏆 本輪得獎者
    </h2>

    <div id="winnerList"></div>

    <!-- 未中獎 -->
    <h2 class="remain-title">
        🎯 尚未抽中名單
    </h2>

    <div id="remainList"></div>

</div>

<!-- 右側 -->
<div class="right-panel">

    <h2>
        📜 所有得獎名單
    </h2>

    <div id="allWinnerList"></div>

</div>

<!-- 音效 -->
<audio id="spinSound" preload="auto">
    <source src="souce.m4a" type="audio/mp4">
</audio>

<script>

////////////////////////////////////////////////////////
// API
////////////////////////////////////////////////////////

const API_URL =
'https://script.google.com/macros/s/AKfycbyDm_9tAXT6vwCmqkpnLfecoukALyiVIRxkY5QubO3X8EMbbqIMmHnsG7p0AZza3q8/exec';

////////////////////////////////////////////////////////

let people = [];
let prizes = [];
let winners = [];

let currentPrizeIndex = 0;

////////////////////////////////////////////////////////
// 初始化
////////////////////////////////////////////////////////

async function init(){

    const response =
    await fetch(API_URL);

    const data =
    await response.json();

    people = data.people;

    prizes = data.prizes;

    winners = data.winners;

    findCurrentPrize();

    renderAllWinners();

    renderRemainList();

    showCurrentPrize();
}

////////////////////////////////////////////////////////

function findCurrentPrize(){

    let counter = {};

    winners.forEach(w=>{

        if(!counter[w.prize]){

            counter[w.prize] = 0;
        }

        counter[w.prize]++;
    });

    for(let i=0;i<prizes.length;i++){

        const prizeName =
        prizes[i]["獎項"];

        const total =
        parseInt(prizes[i]["人數"]);

        const current =
        counter[prizeName] || 0;

        if(current < total){

            currentPrizeIndex = i;

            break;
        }
    }
}

////////////////////////////////////////////////////////

function showCurrentPrize(){

    if(currentPrizeIndex >= prizes.length){

        document
        .getElementById("currentPrize")
        .innerText =
        "🎉 所有獎項已抽完";

        return;
    }

    const prize =
    prizes[currentPrizeIndex];

    document
    .getElementById("currentPrize")
    .innerText =
    `🎁 目前抽：${prize["獎項"]}（${prize["人數"]}人）`;
}

////////////////////////////////////////////////////////

function getAvailablePeople(){

    const winnerNames =
    winners.map(w=>w.name);

    return people.filter(
        p => !winnerNames.includes(p["姓名"])
    );
}

////////////////////////////////////////////////////////
// 顯示未中獎
////////////////////////////////////////////////////////

function renderRemainList(){

    const remain =
    getAvailablePeople();

    const div =
    document.getElementById("remainList");

    div.innerHTML = "";

    remain.forEach(person=>{

        div.innerHTML += `

            <div class="remain-item">

                ${person["姓名"]}

            </div>
        `;
    });
}

////////////////////////////////////////////////////////
// 顯示全部得獎
////////////////////////////////////////////////////////

function renderAllWinners(){

    const div =
    document.getElementById("allWinnerList");

    div.innerHTML = "";

    let grouped = {};

    winners.forEach(w=>{

        if(!grouped[w.prize]){

            grouped[w.prize] = [];
        }

        grouped[w.prize].push(w.name);
    });

    Object.keys(grouped).forEach(prize=>{

        div.innerHTML += `

            <div class="allWinner">

                <div class="prize-title">
                    🎉 ${prize}
                </div>

                <div class="prize-names">
                    ${grouped[prize].join("、")}
                </div>

            </div>
        `;
    });
}

////////////////////////////////////////////////////////
// 建立拉霸
////////////////////////////////////////////////////////

function createSlot(nameList){

    const reel =
    document.createElement("div");

    reel.className = "reel";

    const inner =
    document.createElement("div");

    inner.className = "reel-inner";

    for(let i=0;i<25;i++){

        const random =
        nameList[
            Math.floor(
                Math.random() * nameList.length
            )
        ];

        inner.innerHTML += `

            <div class="slot-name">
                ${random["姓名"]}
            </div>
        `;
    }

    reel.appendChild(inner);

    return {
        reel,
        inner
    };
}

////////////////////////////////////////////////////////
// 抽獎
////////////////////////////////////////////////////////

async function drawLottery(){

    const drawBtn =
    document.getElementById("drawBtn");

    drawBtn.disabled = true;

    const prize =
    prizes[currentPrizeIndex];

    const drawCount =
    parseInt(prize["人數"]);

    const available =
    getAvailablePeople();

    //////////////////////////////////////////////////////
    // 音效
    //////////////////////////////////////////////////////

    const spinSound =
    document.getElementById("spinSound");

    spinSound.currentTime = 0;

    spinSound.play();

    //////////////////////////////////////////////////////
    // 建立拉霸
    //////////////////////////////////////////////////////

    const machine =
    document.getElementById("slotMachine");

    machine.innerHTML = "";

    let slots = [];

    for(let i=0;i<drawCount;i++){

        const slot =
        createSlot(available);

        machine.appendChild(slot.reel);

        slots.push(slot);
    }

    //////////////////////////////////////////////////////
    // 開始滾動
    //////////////////////////////////////////////////////

    slots.forEach(slot=>{

        slot.inner.style.transition =
        "transform 5s cubic-bezier(.17,.67,.19,1)";

        slot.inner.style.transform =
        "translateY(-2200px)";
    });

    //////////////////////////////////////////////////////
    // 五秒後停止
    //////////////////////////////////////////////////////

    setTimeout(async ()=>{

        spinSound.pause();

        spinSound.currentTime = 0;

        //////////////////////////////////////////////////
        // 正式得獎
        //////////////////////////////////////////////////

        let temp = [...available];

        let currentWinners = [];

        for(let i=0;i<drawCount;i++){

            const randomIndex =
            Math.floor(
                Math.random() * temp.length
            );

            currentWinners.push(
                temp[randomIndex]
            );

            temp.splice(randomIndex,1);
        }

        //////////////////////////////////////////////////
        // 停在得獎者
        //////////////////////////////////////////////////

        slots.forEach((slot,index)=>{

            slot.inner.innerHTML = "";

            for(let i=0;i<15;i++){

                slot.inner.innerHTML += `

                    <div class="slot-name">
                        ${currentWinners[index]["姓名"]}
                    </div>
                `;
            }

            slot.inner.style.transition =
            "none";

            slot.inner.style.transform =
            "translateY(-980px)";
        });

        //////////////////////////////////////////////////
        // 本輪得獎
        //////////////////////////////////////////////////

        const winnerList =
        document.getElementById("winnerList");

        winnerList.innerHTML = "";

        currentWinners.forEach(w=>{

            winnerList.innerHTML += `

                <div class="winner-item">

                    ${w["姓名"]}

                </div>
            `;

            winners.push({

                prize:prize["獎項"],

                name:w["姓名"]
            });
        });

        //////////////////////////////////////////////////
        // 寫回 Google Sheet
        //////////////////////////////////////////////////

        await fetch(API_URL,{

            method:"POST",

            body:JSON.stringify({

                prize:prize["獎項"],

                winners:currentWinners
            })
        });

        renderAllWinners();

        renderRemainList();

        currentPrizeIndex++;

        showCurrentPrize();

        drawBtn.disabled = false;

    },5000);
}

////////////////////////////////////////////////////////
// 重置
////////////////////////////////////////////////////////

async function resetLottery(){

    if(!confirm("確定重置？")){

        return;
    }

    await fetch(API_URL,{

        method:"POST",

        body:JSON.stringify({

            action:"reset"
        })
    });

    location.reload();
}

////////////////////////////////////////////////////////

document
.getElementById("drawBtn")
.addEventListener(
    "click",
    drawLottery
);

document
.getElementById("resetBtn")
.addEventListener(
    "click",
    resetLottery
);

////////////////////////////////////////////////////////

init();

</script>

</body>
</html>
