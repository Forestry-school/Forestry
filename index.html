<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 福瑞斯特謝師感恩餐會</title>
<style>
    /* ================= 基本設定 ================= */
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0;
        background: #0a0a0a; color: white;
        font-family: "Microsoft JhengHei", sans-serif;
        display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden;
    }
    
    /* ================= 主畫面居中 ================= */
    .main-panel {
        width: 90%; max-width: 1200px; padding: 60px 0;
        display: flex; flex-direction: column; align-items: center;
    }

    h1 {
        color: gold; font-size: 64px; margin: 0 0 40px 0;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.6); letter-spacing: 8px;
    }

    .btn-group {
        display: flex; gap: 20px; margin-bottom: 40px;
    }

    button {
        padding: 20px 45px; border: none; border-radius: 15px;
        font-size: 26px; font-weight: bold; cursor: pointer; transition: all 0.2s;
    }
    button:active { transform: scale(0.95); }
    
    #nextPrizeBtn { background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: white; box-shadow: 0 6px 15px rgba(0, 210, 255, 0.3); }
    #drawBtn { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4); }
    button:disabled { background: #333 !important; color: #666 !important; cursor: not-allowed !important; box-shadow: none !important; }

    #resetBtn { background: #444; color: #ccc; font-size: 16px; padding: 10px 20px; position: fixed; bottom: 20px; right: 20px; opacity: 0.5; }
    #resetBtn:hover { opacity: 1; }

    #currentPrize {
        color: #fff; font-size: 42px; margin-bottom: 45px;
        background: rgba(255, 215, 0, 0.1); padding: 20px 60px;
        border-radius: 60px; border: 3px solid gold; font-weight: bold;
        min-height: 100px; display: flex; align-items: center; text-align: center;
    }

    /* ================= 拉霸機台 ================= */
    .slot-machine-container {
        background: #151515; padding: 40px; 
        border-radius: 30px; border: 10px solid #222;
        box-shadow: inset 0 0 60px #000, 0 20px 60px rgba(0,0,0,0.9);
        width: 100%;
    }

    #slotMachine {
        display: grid; 
        grid-template-columns: repeat(5, 1fr);
        gap: 25px; margin: 0 auto;
    }

    .reel {
        width: 100%; height: 160px; box-sizing: border-box; 
        overflow: hidden; border-radius: 15px; position: relative;
        background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 50%, #ffffff 100%);
        border: 5px solid #000; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }
    
    .reel::after {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 25%, transparent 75%, rgba(0,0,0,0.8) 100%);
        pointer-events: none; z-index: 2;
    }

    .reel-inner { display: flex; flex-direction: column; }

    .slot-name {
        width: 100%; height: 160px; display: flex; align-items: center;
        justify-content: center; text-align: center; 
        padding: 0 10px;
        font-size: 42px; font-weight: 900; color: #111; 
        white-space: nowrap; overflow: hidden;
    }

    .slot-winner-name { color: #e60000; font-size: 48px; text-shadow: 1px 1px 0px rgba(255,255,255,0.8); }

</style>
</head>
<body>

    <div class="main-panel">
        <h1>🎰 福瑞斯特謝師感恩餐會 🎰</h1>

        <div class="btn-group">
            <button id="nextPrizeBtn" disabled>讀取資料中...</button>
            <button id="drawBtn" disabled>等待獎項</button>
        </div>

        <div id="currentPrize">正在準備名單，請稍候...</div>

        <div class="slot-machine-container">
            <div id="slotMachine"></div>
        </div>

        <button id="resetBtn">系統重置</button>
    </div>

    <audio id="spinSound" preload="auto">
        <source src="souce.m4a" type="audio/mp4">
    </audio>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyDm_9tAXT6vwCmqkpnLfecoukALyiVIRxkY5QubO3X8EMbbqIMmHnsG7p0AZza3q8/exec';

    let people = [];
    let prizes = [];
    let winners = [];
    let currentPrizeIndex = -1;
    let isDataLoaded = false;

    const SLOT_HEIGHT = 160; 
    const TOTAL_FAKE_NAMES = 30; 

    async function init() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            people = data.people;
            prizes = data.prizes;
            winners = data.winners;

            isDataLoaded = true;
            document.getElementById("nextPrizeBtn").disabled = false;
            document.getElementById("nextPrizeBtn").innerText = "準備下一個獎項";
            document.getElementById("currentPrize").innerText = "名單就緒，請點擊「準備下一個獎項」";
        } catch (e) {
            document.getElementById("currentPrize").innerText = "❌ 連線失敗，請檢查網路";
        }
    }

    function prepareNextPrize() {
        if (!isDataLoaded) return;

        let counter = {};
        winners.forEach(w => {
            if (!counter[w.prize]) counter[w.prize] = 0;
            counter[w.prize]++;
        });

        let found = false;
        for (let i = 0; i < prizes.length; i++) {
            const prizeName = prizes[i]["獎項"];
            const total = parseInt(prizes[i]["人數"]);
            const current = counter[prizeName] || 0;
            if (current < total) {
                currentPrizeIndex = i;
                found = true;
                break;
            }
        }

        const display = document.getElementById("currentPrize");
        const drawBtn = document.getElementById("drawBtn");
        const nextBtn = document.getElementById("nextPrizeBtn");

        if (found) {
            const prize = prizes[currentPrizeIndex];
            display.innerText = `🎁 目前抽：${prize["獎項"]} (${prize["人數"]}人)`;
            drawBtn.disabled = false;
            nextBtn.disabled = true; 
            document.getElementById("slotMachine").innerHTML = ""; 
        } else {
            display.innerText = "🎉 恭喜！所有獎項已抽完！";
            drawBtn.disabled = true;
            nextBtn.disabled = true;
        }
    }

    function getAvailablePeople() {
        const winnerNames = winners.map(w => w.name);
        return people.filter(p => !winnerNames.includes(p["姓名"]));
    }

    function createSlot(nameList, winnerData) {
        const reel = document.createElement("div");
        reel.className = "reel";
        const inner = document.createElement("div");
        inner.className = "reel-inner";

        for (let i = 0; i < TOTAL_FAKE_NAMES; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            const nameStr = random ? random["姓名"] : "?";
            inner.innerHTML += `<div class="slot-name">${nameStr}</div>`;
        }
        inner.innerHTML += `<div class="slot-name slot-winner-name">${winnerData["姓名"]}</div>`;
        for (let i = 0; i < 3; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            const nameStr = random ? random["姓名"] : "?";
            inner.innerHTML += `<div class="slot-name">${nameStr}</div>`;
        }
        reel.appendChild(inner);
        return { reel, inner };
    }

    async function drawLottery() {
        const drawBtn = document.getElementById("drawBtn");
        drawBtn.disabled = true;

        const prize = prizes[currentPrizeIndex];
        const available = getAvailablePeople();
        const drawCount = Math.min(parseInt(prize["人數"]), available.length);

        if (drawCount === 0) return;

        const spinSound = document.getElementById("spinSound");
        spinSound.currentTime = 0;
        spinSound.play();

        let temp = [...available];
        let currentWinners = [];
        for (let i = 0; i < drawCount; i++) {
            const randomIndex = Math.floor(Math.random() * temp.length);
            currentWinners.push(temp[randomIndex]);
            temp.splice(randomIndex, 1);
        }

        const machine = document.getElementById("slotMachine");
        machine.innerHTML = "";
        let slots = [];

        for (let i = 0; i < drawCount; i++) {
            const slot = createSlot(available, currentWinners[i]);
            machine.appendChild(slot.reel);
            slots.push(slot);
        }

        void machine.offsetWidth; 

        const targetY = -(TOTAL_FAKE_NAMES * SLOT_HEIGHT);
        let maxSpinTime = 0;

        slots.forEach((slot, index) => {
            const duration = 3 + (index * 0.3);
            if (duration > maxSpinTime) maxSpinTime = duration;
            slot.inner.style.transition = `transform ${duration}s cubic-bezier(0.1, 0.8, 0.1, 1.15)`;
            slot.inner.style.transform = `translateY(${targetY}px)`;
        });

        setTimeout(async () => {
            spinSound.pause();
            spinSound.currentTime = 0;

            currentWinners.forEach(w => {
                winners.push({ prize: prize["獎項"], name: w["姓名"] });
            });

            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({
                    prize: prize["獎項"],
                    winners: currentWinners
                })
            });

            document.getElementById("nextPrizeBtn").disabled = false;

        }, maxSpinTime * 1000 + 400);
    }

    async function resetLottery() {
        if (!confirm("確定要重置所有得獎資料嗎？")) return;
        document.getElementById("currentPrize").innerText = "♻️ 清除雲端資料中...";
        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "reset" })
        });
        setTimeout(() => { location.reload(); }, 1000);
    }

    document.getElementById("nextPrizeBtn").addEventListener("click", prepareNextPrize);
    document.getElementById("drawBtn").addEventListener("click", drawLottery);
    document.getElementById("resetBtn").addEventListener("click", resetLottery);

    init();
</script>
</body>
</html>
