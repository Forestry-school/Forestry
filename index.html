<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>🎰 謝師宴摸彩系統</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- 中間 -->
    <div class="center">

        <h1>
            🎰 謝師宴摸彩 🎰
        </h1>

        <div class="btn-group">

            <button id="drawBtn">
                開始抽獎
            </button>

            <button id="resetBtn">
                重置所有抽獎
            </button>

        </div>

        <!-- 目前獎項 -->
        <div id="currentPrize"></div>

        <!-- 拉霸 -->
        <div id="slotContainer"></div>

        <!-- 本輪得獎 -->
        <h2 class="winner-title">
            🏆 本輪得獎者
        </h2>

        <ul id="winnerList"></ul>

        <!-- 剩餘未中獎 -->
        <h2 class="remain-title">
            🎯 尚未抽中名單
        </h2>

        <div id="remainList"></div>

    </div>

    <!-- 右側 -->
    <div class="right">

        <h2>
            📜 所有得獎名單
        </h2>

        <div id="allWinnerList"></div>

    </div>

</div>

<!-- 音效 -->
<audio id="spinSound" preload="auto">
    <source src="souce.m4a" type="audio/mp4">
</audio>

<script>

////////////////////////////////////////////////////////
// API
////////////////////////////////////////////////////////

const API_URL =
'https://script.google.com/macros/s/AKfycbyDm_9tAXT6vwCmqkpnLfecoukALyiVIRxkY5QubO3X8EMbbqIMmHnsG7p0AZza3q8/exec';

////////////////////////////////////////////////////////

let people = [];
let prizes = [];
let winners = [];

let currentPrizeIndex = 0;

////////////////////////////////////////////////////////
// 初始化
////////////////////////////////////////////////////////

async function init(){

    const response =
    await fetch(API_URL);

    const data =
    await response.json();

    people = data.people;

    prizes = data.prizes;

    winners = data.winners;

    findCurrentPrize();

    renderAllWinners();

    renderRemainList();

    showCurrentPrize();
}

////////////////////////////////////////////////////////
// 找目前獎項
////////////////////////////////////////////////////////

function findCurrentPrize(){

    let counter = {};

    winners.forEach(w=>{

        if(!counter[w.prize]){

            counter[w.prize] = 0;
        }

        counter[w.prize]++;
    });

    for(let i=0;i<prizes.length;i++){

        const prizeName =
        prizes[i]["獎項"];

        const total =
        parseInt(prizes[i]["人數"]);

        const current =
        counter[prizeName] || 0;

        if(current < total){

            currentPrizeIndex = i;

            break;
        }
    }
}

////////////////////////////////////////////////////////
// 顯示目前獎項
////////////////////////////////////////////////////////

function showCurrentPrize(){

    if(currentPrizeIndex >= prizes.length){

        document
        .getElementById("currentPrize")
        .innerText =
        "🎉 所有獎項已抽完";

        return;
    }

    const prize =
    prizes[currentPrizeIndex];

    document
    .getElementById("currentPrize")
    .innerText =

    `🎁 目前抽：${prize["獎項"]}（${prize["人數"]}人）`;
}

////////////////////////////////////////////////////////
// 顯示全部得獎名單
////////////////////////////////////////////////////////

function renderAllWinners(){

    const div =
    document.getElementById("allWinnerList");

    div.innerHTML = "";

    let grouped = {};

    winners.forEach(w=>{

        if(!grouped[w.prize]){

            grouped[w.prize] = [];
        }

        grouped[w.prize].push(w.name);
    });

    Object.keys(grouped).forEach(prize=>{

        div.innerHTML += `

            <div class="allWinner">

                <div class="prize-title">
                    🎉 ${prize}
                </div>

                <div class="prize-names">
                    ${grouped[prize].join("、")}
                </div>

            </div>
        `;
    });
}

////////////////////////////////////////////////////////
// 未中獎名單
////////////////////////////////////////////////////////

function getAvailablePeople(){

    const winnerNames =
    winners.map(w=>w.name);

    return people.filter(
        p => !winnerNames.includes(p["姓名"])
    );
}

////////////////////////////////////////////////////////
// 顯示剩餘名單
////////////////////////////////////////////////////////

function renderRemainList(){

    const remain =
    getAvailablePeople();

    const div =
    document.getElementById("remainList");

    div.innerHTML = "";

    remain.forEach(person=>{

        div.innerHTML += `

            <div class="remain-item">

                ${person["姓名"]}

            </div>
        `;
    });
}

////////////////////////////////////////////////////////
// 顯示拉霸
////////////////////////////////////////////////////////

function renderRollingSlots(people){

    const container =
    document.getElementById("slotContainer");

    container.innerHTML = "";

    people.forEach(person=>{

        const div =
        document.createElement("div");

        div.className = "slot-card";

        div.innerHTML = `

            <div class="slot-inner">

                <div class="slot-name">
                    ${person["姓名"]}
                </div>

            </div>

        `;

        container.appendChild(div);
    });
}

////////////////////////////////////////////////////////
// 抽獎
////////////////////////////////////////////////////////

async function drawLottery(){

    const drawBtn =
    document.getElementById("drawBtn");

    if(currentPrizeIndex >= prizes.length){

        alert("所有獎項已抽完");

        return;
    }

    drawBtn.disabled = true;

    //////////////////////////////////////////////////////
    // 音效
    //////////////////////////////////////////////////////

    const spinSound =
    document.getElementById("spinSound");

    spinSound.currentTime = 0;

    spinSound.play();

    //////////////////////////////////////////////////////

    const prize =
    prizes[currentPrizeIndex];

    const prizeName =
    prize["獎項"];

    const drawCount =
    parseInt(prize["人數"]);

    const available =
    getAvailablePeople();

    //////////////////////////////////////////////////////
    // 跑動動畫
    //////////////////////////////////////////////////////

    let rolling = true;

    const rollingInterval = setInterval(()=>{

        if(!rolling) return;

        let tempPool = [...available];

        let rollingPeople = [];

        for(let i=0;i<drawCount;i++){

            const randomIndex =
            Math.floor(
                Math.random() * tempPool.length
            );

            rollingPeople.push(
                tempPool[randomIndex]
            );

            tempPool.splice(randomIndex,1);
        }

        renderRollingSlots(
            rollingPeople
        );

    },100);

    //////////////////////////////////////////////////////
    // 五秒後停止
    //////////////////////////////////////////////////////

    setTimeout(async ()=>{

        rolling = false;

        clearInterval(rollingInterval);

        spinSound.pause();

        spinSound.currentTime = 0;

        //////////////////////////////////////////////////////
        // 正式得獎
        //////////////////////////////////////////////////////

        let temp = [...available];

        let currentWinners = [];

        for(let i=0;i<drawCount;i++){

            const randomIndex =
            Math.floor(
                Math.random() * temp.length
            );

            const winner =
            temp[randomIndex];

            currentWinners.push(winner);

            temp.splice(randomIndex,1);
        }

        //////////////////////////////////////////////////////
        // 顯示中獎
        //////////////////////////////////////////////////////

        setTimeout(()=>{

            renderRollingSlots(currentWinners);

        },100);

        //////////////////////////////////////////////////////
        // 本輪得獎
        //////////////////////////////////////////////////////

        const ul =
        document.getElementById("winnerList");

        ul.innerHTML = "";

        currentWinners.forEach(w=>{

            const li =
            document.createElement("li");

            li.innerText =
            `${w["姓名"]}`;

            ul.appendChild(li);

            winners.push({

                prize:prizeName,

                name:w["姓名"]
            });
        });

        //////////////////////////////////////////////////////
        // 寫回 Google Sheet
        //////////////////////////////////////////////////////

        await fetch(API_URL,{

            method:"POST",

            body:JSON.stringify({

                prize:prizeName,

                winners:currentWinners
            })
        });

        //////////////////////////////////////////////////////

        renderAllWinners();

        setTimeout(()=>{

            renderRemainList();

        },300);

        currentPrizeIndex++;

        showCurrentPrize();

        //////////////////////////////////////////////////////
        // 解鎖按鈕
        //////////////////////////////////////////////////////

        setTimeout(()=>{

            drawBtn.disabled = false;

        },3000);

    },5000);
}

////////////////////////////////////////////////////////
// 重置
////////////////////////////////////////////////////////

async function resetLottery(){

    if(!confirm("確定要重置所有抽獎嗎？")){

        return;
    }

    await fetch(API_URL,{

        method:"POST",

        body:JSON.stringify({

            action:"reset"
        })
    });

    location.reload();
}

////////////////////////////////////////////////////////

document
.getElementById("drawBtn")
.addEventListener(
    "click",
    drawLottery
);

document
.getElementById("resetBtn")
.addEventListener(
    "click",
    resetLottery
);

////////////////////////////////////////////////////////

init();

</script>

</body>
</html>
