<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 福瑞斯特謝師感恩餐會</title>
<style>
    /* ================= 基本設定 ================= */
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0;
        background: #0a0a0a; color: white;
        font-family: "Microsoft JhengHei", sans-serif;
        display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden;
    }
    
    .main-panel {
        width: 95%; max-width: 1400px; padding: 40px 0;
        display: flex; flex-direction: column; align-items: center;
    }

    h1 {
        color: gold; font-size: 52px; margin: 0 0 20px 0;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.6); letter-spacing: 4px;
    }

    .btn-group { display: flex; gap: 15px; margin-bottom: 25px; }

    button {
        padding: 15px 35px; border: none; border-radius: 12px;
        font-size: 22px; font-weight: bold; cursor: pointer; transition: all 0.2s;
    }
    button:active { transform: scale(0.95); }
    
    #nextPrizeBtn { background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: white; }
    #drawBtn { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
    button:disabled { background: #333 !important; color: #666 !important; cursor: not-allowed !important; }

    #resetBtn { background: #444; color: #ccc; font-size: 14px; padding: 8px 15px; position: fixed; bottom: 15px; right: 15px; opacity: 0.3; }

    #currentPrize {
        color: #fff; font-size: 32px; margin-bottom: 25px;
        background: rgba(255, 215, 0, 0.1); padding: 15px 40px;
        border-radius: 40px; border: 2px solid gold; font-weight: bold;
        min-height: 70px; display: flex; align-items: center; text-align: center;
    }

    /* ================= 拉霸網格系統 (30人專用) ================= */
    .slot-machine-container {
        background: #111; padding: 25px; 
        border-radius: 20px; border: 5px solid #222;
        box-shadow: inset 0 0 40px #000;
        width: 100%;
    }

    #slotMachine {
        display: grid; 
        /* 自動填滿，每個盒子寬度最少 120px，最多等分 */
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 12px; 
        justify-content: center;
    }

    /* 針對人數極多時縮小高度 */
    .reel {
        height: 100px; box-sizing: border-box; 
        overflow: hidden; border-radius: 8px; position: relative;
        background: linear-gradient(to bottom, #ffffff 0%, #d0d0d0 50%, #ffffff 100%);
        border: 3px solid #000; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    
    .reel::after {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.7) 100%);
        pointer-events: none; z-index: 2;
    }

    .reel-inner { display: flex; flex-direction: column; }

    .slot-name {
        width: 100%; height: 100px; display: flex; align-items: center;
        justify-content: center; text-align: center; 
        padding: 0 5px; font-size: 24px; font-weight: 800; color: #222; 
        white-space: nowrap; overflow: hidden;
    }

    /* 得獎者縮放與亮色 */
    .slot-winner-name { 
        color: #d00000; 
        font-size: 28px; 
        text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
    }

</style>
</head>
<body>

    <div class="main-panel">
        <h1>🎰 福瑞斯特謝師感恩餐會</h1>

        <div class="btn-group">
            <button id="nextPrizeBtn" disabled>讀取資料中...</button>
            <button id="drawBtn" disabled>等待獎項</button>
        </div>

        <div id="currentPrize">正在準備名單...</div>

        <div class="slot-machine-container">
            <div id="slotMachine"></div>
        </div>

        <button id="resetBtn">系統重置</button>
    </div>

    <audio id="spinSound" preload="auto">
        <source src="souce.m4a" type="audio/mp4">
    </audio>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyDm_9tAXT6vwCmqkpnLfecoukALyiVIRxkY5QubO3X8EMbbqIMmHnsG7p0AZza3q8/exec';

    let people = [];
    let prizes = [];
    let winners = [];
    let currentPrizeIndex = -1;
    let isDataLoaded = false;

    const SLOT_HEIGHT = 100; // 降低高度以適應多列
    const TOTAL_FAKE_NAMES = 65; 

    async function init() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            people = data.people;
            prizes = data.prizes;
            winners = data.winners;
            isDataLoaded = true;
            document.getElementById("nextPrizeBtn").disabled = false;
            document.getElementById("nextPrizeBtn").innerText = "準備下一個獎項";
            document.getElementById("currentPrize").innerText = "名單就緒，請點擊準備下一個獎項";
        } catch (e) {
            document.getElementById("currentPrize").innerText = "❌ 連線失敗";
        }
    }

    function prepareNextPrize() {
        if (!isDataLoaded) return;
        let counter = {};
        winners.forEach(w => {
            if (!counter[w.prize]) counter[w.prize] = 0;
            counter[w.prize]++;
        });

        let found = false;
        for (let i = 0; i < prizes.length; i++) {
            const prizeName = prizes[i]["獎項"];
            const total = parseInt(prizes[i]["人數"]);
            const current = counter[prizeName] || 0;
            if (current < total) {
                currentPrizeIndex = i;
                found = true;
                break;
            }
        }

        const display = document.getElementById("currentPrize");
        const drawBtn = document.getElementById("drawBtn");
        const nextBtn = document.getElementById("nextPrizeBtn");

        if (found) {
            const prize = prizes[currentPrizeIndex];
            display.innerText = `🎁 目前抽：${prize["獎項"]} (${prize["人數"]}人)`;
            drawBtn.disabled = false;
            nextBtn.disabled = true; 
            document.getElementById("slotMachine").innerHTML = ""; 
        } else {
            display.innerText = "🎉 恭喜！所有獎項已抽完！";
            drawBtn.disabled = true;
            nextBtn.disabled = true;
        }
    }

    function createSlot(nameList, winnerData) {
        const reel = document.createElement("div");
        reel.className = "reel";
        const inner = document.createElement("div");
        inner.className = "reel-inner";

        for (let i = 0; i < TOTAL_FAKE_NAMES; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            const nameStr = random ? random["姓名"] : "?";
            inner.innerHTML += `<div class="slot-name">${nameStr}</div>`;
        }
        inner.innerHTML += `<div class="slot-name slot-winner-name">${winnerData["姓名"]}</div>`;
        for (let i = 0; i < 3; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            inner.innerHTML += `<div class="slot-name">${random ? random["姓名"] : "?"}</div>`;
        }
        reel.appendChild(inner);
        return { reel, inner };
    }

    async function drawLottery() {
        const drawBtn = document.getElementById("drawBtn");
        drawBtn.disabled = true;

        const prize = prizes[currentPrizeIndex];
        const winnerNames = winners.map(w => w.name);
        const available = people.filter(p => !winnerNames.includes(p["姓名"]));
        const drawCount = Math.min(parseInt(prize["人數"]), available.length);

        if (drawCount === 0) return;

        const spinSound = document.getElementById("spinSound");
        spinSound.currentTime = 0;
        spinSound.play();

        let temp = [...available];
        let currentWinners = [];
        for (let i = 0; i < drawCount; i++) {
            const randomIndex = Math.floor(Math.random() * temp.length);
            currentWinners.push(temp[randomIndex]);
            temp.splice(randomIndex, 1);
        }

        const machine = document.getElementById("slotMachine");
        machine.innerHTML = "";
        let slots = [];

        for (let i = 0; i < drawCount; i++) {
            const slot = createSlot(available, currentWinners[i]);
            machine.appendChild(slot.reel);
            slots.push(slot);
        }

        void machine.offsetWidth; 

        const targetY = -(TOTAL_FAKE_NAMES * SLOT_HEIGHT);

        // 核心計時：不論多少人，最後一格一定在 8 秒整停下
        slots.forEach((slot, index) => {
            // 起始時間 5.5 秒，根據 index 遞增，最後一個 index 的 duration 會是 8.0 秒
            const step = drawCount > 1 ? (2.5 / (drawCount - 1)) : 0;
            const duration = 5.5 + (index * step); 
            slot.inner.style.transition = `transform ${duration}s cubic-bezier(0.1, 0.8, 0.1, 1.1)`;
            slot.inner.style.transform = `translateY(${targetY}px)`;
        });

        setTimeout(async () => {
            spinSound.pause();
            currentWinners.forEach(w => {
                winners.push({ prize: prize["獎項"], name: w["姓名"] });
            });
            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ prize: prize["獎項"], winners: currentWinners })
            });
            document.getElementById("nextPrizeBtn").disabled = false;
        }, 8300); 
    }

    async function resetLottery() {
        if (!confirm("確定要重置嗎？")) return;
        await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "reset" }) });
        location.reload();
    }

    document.getElementById("nextPrizeBtn").addEventListener("click", prepareNextPrize);
    document.getElementById("drawBtn").addEventListener("click", drawLottery);
    document.getElementById("resetBtn").addEventListener("click", resetLottery);
    init();
</script>
</body>
</html>
