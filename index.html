<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 福瑞斯特謝師感恩餐會 - 寬版專業開獎</title>
<style>
    /* ================= 基本設定 ================= */
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0;
        background: #000; color: white;
        font-family: "Microsoft JhengHei", sans-serif;
        display: flex; height: 100vh; overflow: hidden;
    }
    
    /* ================= 左側：寬版主拉霸區 (80%) ================= */
    .left-panel {
        flex: 0 0 80%;
        display: flex; flex-direction: column; align-items: center;
        padding: 30px 1% 10px 1%; /* 縮小左右 padding 增加可用寬度 */
        position: relative;
        border-right: 2px solid #222;
    }

    h1 {
        color: gold; font-size: clamp(40px, 6vw, 65px); margin: 0 0 15px 0;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.6); letter-spacing: 10px;
    }

    #drawBtn {
        padding: 20px 100px; border: none; border-radius: 20px;
        font-size: 38px; font-weight: bold; cursor: pointer; transition: all 0.2s;
        background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000;
        box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); margin-bottom: 20px;
        z-index: 10;
    }
    #drawBtn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 215, 0, 0.6); }
    #drawBtn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }

    #currentPrize {
        color: #fff; font-size: 40px; margin-bottom: 20px;
        background: rgba(255, 215, 0, 0.15); padding: 12px 70px;
        border-radius: 60px; border: 3px solid gold; font-weight: bold;
    }

    /* 寬版拉霸機台容器 */
    .slot-machine-container {
        width: 98%; /* 讓機台幾乎填滿左側區域 */
        padding: 25px;
        background: #151515; border-radius: 30px; border: 6px solid #282828;
        box-shadow: inset 0 0 80px #000, 0 10px 40px rgba(0,0,0,0.8);
    }

    #slotMachine {
        display: grid; 
        grid-template-columns: repeat(5, 1fr); /* 固定 5 欄 */
        gap: 12px; /* 縮小間距讓內容更寬 */
    }

    .reel {
        height: 140px; overflow: hidden; border-radius: 12px; position: relative;
        background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 50%, #ffffff 100%);
        border: 4px solid #000; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    
    .reel::after {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 35%, transparent 65%, rgba(0,0,0,0.7) 100%);
        pointer-events: none; z-index: 2;
    }

    .reel-inner { display: flex; flex-direction: column; }
    .slot-name {
        width: 100%; height: 140px; display: flex; align-items: center;
        justify-content: center; text-align: center; 
        font-size: 34px; font-weight: 900; color: #111;
        white-space: nowrap; padding: 0 5px;
    }
    .slot-winner-name { color: #d00000; font-size: 40px; text-shadow: 1px 1px 0px rgba(255,255,255,0.6); }

    /* ================= 右側：榮譽榜 (20%) ================= */
    .right-panel {
        flex: 0 0 20%; background: #080808; padding: 25px 15px; overflow-y: auto;
    }
    .right-panel h2 {
        color: gold; font-size: 26px; border-bottom: 3px solid gold;
        padding-bottom: 12px; margin-top: 0; text-align: center; letter-spacing: 2px;
    }
    .allWinner { padding: 15px 0; border-bottom: 1px solid #222; }
    .prize-title { color: gold; font-size: 19px; font-weight: bold; margin-bottom: 8px; }
    .prize-names { color: #ccc; font-size: 16px; line-height: 1.5; word-break: break-all; }

    /* ================= 控制與重置 ================= */
    .controls {
        position: fixed; bottom: 20px; left: 20px;
        display: flex; flex-direction: column; gap: 10px; z-index: 100;
    }
    #nextPrizeBtn {
        background: #0077b6; color: white; border: none; padding: 15px 30px;
        border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.6); transition: 0.2s;
    }
    #nextPrizeBtn:hover:not(:disabled) { background: #0096c7; }
    #nextPrizeBtn:disabled { background: #222; color: #444; }

    #resetBtn {
        background: transparent; color: #222; border: 1px solid #111;
        padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;
        width: fit-content;
    }
    #resetBtn:hover { color: #aa0000; border-color: #aa0000; }

</style>
</head>
<body>

    <div class="controls">
        <button id="nextPrizeBtn" disabled>資料載入中...</button>
        <button id="resetBtn">🔄 系統重置</button>
    </div>

    <div class="left-panel">
        <h1>🎰 福瑞斯特謝師感恩餐會</h1>
        
        <button id="drawBtn" disabled>等待鎖定獎項</button>
        
        <div id="currentPrize">請點擊「鎖定下個獎項」</div>

        <div class="slot-machine-container">
            <div id="slotMachine"></div>
        </div>
    </div>

    <div class="right-panel">
        <h2>📜 榮譽得獎榜</h2>
        <div id="allWinnerList"></div>
    </div>

    <audio id="spinSound" preload="auto">
        <source src="souce.m4a" type="audio/mp4">
    </audio>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyDm_9tAXT6vwCmqkpnLfecoukALyiVIRxkY5QubO3X8EMbbqIMmHnsG7p0AZza3q8/exec';

    let people = [];
    let prizes = [];
    let winners = [];
    let currentPrizeIndex = -1;
    let isDataLoaded = false;
    const SLOT_HEIGHT = 140; 
    const TOTAL_FAKE_NAMES = 60; 

    async function init() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            people = data.people;
            prizes = data.prizes;
            winners = data.winners;
            isDataLoaded = true;
            document.getElementById("nextPrizeBtn").disabled = false;
            document.getElementById("nextPrizeBtn").innerText = "🔍 鎖定下個獎項";
            renderAllWinners();
        } catch (e) {
            document.getElementById("currentPrize").innerText = "❌ 無法讀取資料";
        }
    }

    function renderAllWinners() {
        const div = document.getElementById("allWinnerList");
        div.innerHTML = "";
        let grouped = {};
        winners.forEach(w => {
            if (!grouped[w.prize]) grouped[w.prize] = [];
            grouped[w.prize].push(w.name);
        });
        Object.keys(grouped).forEach(prize => {
            div.innerHTML += `<div class="allWinner"><div class="prize-title">🎉 ${prize}</div><div class="prize-names">${grouped[prize].join("、")}</div></div>`;
        });
    }

    function prepareNextPrize() {
        if (!isDataLoaded) return;
        let counter = {};
        winners.forEach(w => {
            if (!counter[w.prize]) counter[w.prize] = 0;
            counter[w.prize]++;
        });

        let found = false;
        for (let i = 0; i < prizes.length; i++) {
            const prizeName = prizes[i]["獎項"];
            const total = parseInt(prizes[i]["人數"]);
            const current = counter[prizeName] || 0;
            if (current < total) {
                currentPrizeIndex = i;
                found = true;
                break;
            }
        }

        const display = document.getElementById("currentPrize");
        const drawBtn = document.getElementById("drawBtn");
        const nextBtn = document.getElementById("nextPrizeBtn");

        if (found) {
            const prize = prizes[currentPrizeIndex];
            display.innerText = `🎁 目前抽：${prize["獎項"]} (${prize["人數"]}人)`;
            drawBtn.disabled = false;
            drawBtn.innerText = "🎰 啟動拉霸，好運降臨！";
            nextBtn.disabled = true; 
            document.getElementById("slotMachine").innerHTML = ""; 
        } else {
            display.innerText = "🎉 所有獎項已抽出！";
            drawBtn.disabled = true;
            nextBtn.disabled = true;
        }
    }

    function createSlot(nameList, winnerData) {
        const reel = document.createElement("div");
        reel.className = "reel";
        const inner = document.createElement("div");
        inner.className = "reel-inner";
        for (let i = 0; i < TOTAL_FAKE_NAMES; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            inner.innerHTML += `<div class="slot-name">${random ? random["姓名"] : "---"}</div>`;
        }
        inner.innerHTML += `<div class="slot-name slot-winner-name">${winnerData["姓名"]}</div>`;
        for (let i = 0; i < 3; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            inner.innerHTML += `<div class="slot-name">${random ? random["姓名"] : "---"}</div>`;
        }
        reel.appendChild(inner);
        return { reel, inner };
    }

    async function drawLottery() {
        const drawBtn = document.getElementById("drawBtn");
        const spinSound = document.getElementById("spinSound");
        
        drawBtn.disabled = true;
        drawBtn.innerText = "🚀 開獎中...";

        const prize = prizes[currentPrizeIndex];
        const winnerNames = winners.map(w => w.name);
        const available = people.filter(p => !winnerNames.includes(p["姓名"]));
        const drawCount = Math.min(parseInt(prize["人數"]), available.length);

        spinSound.currentTime = 0;
        spinSound.play();

        let currentWinners = [];
        let temp = [...available];
        for (let i = 0; i < drawCount; i++) {
            const idx = Math.floor(Math.random() * temp.length);
            currentWinners.push(temp[idx]);
            temp.splice(idx, 1);
        }

        const machine = document.getElementById("slotMachine");
        machine.innerHTML = "";
        let slots = [];
        for (let i = 0; i < drawCount; i++) {
            const slot = createSlot(available, currentWinners[i]);
            machine.appendChild(slot.reel);
            slots.push(slot);
        }

        void machine.offsetWidth; 
        const targetY = -(TOTAL_FAKE_NAMES * SLOT_HEIGHT);

        slots.forEach((slot) => {
            slot.inner.style.transition = `transform 8s cubic-bezier(0.1, 0, 0.1, 1)`;
            slot.inner.style.transform = `translateY(${targetY}px)`;
        });

        setTimeout(async () => {
            // === 重要：動畫結束瞬間停止音效 ===
            spinSound.pause();
            spinSound.currentTime = 0;

            currentWinners.forEach(w => {
                winners.push({ prize: prize["獎項"], name: w["姓名"] });
            });
            renderAllWinners();
            
            fetch(API_URL, { method: "POST", body: JSON.stringify({ prize: prize["獎項"], winners: currentWinners }) });
            
            document.getElementById("nextPrizeBtn").disabled = false;
            drawBtn.innerText = "開獎完畢";
        }, 8000); 
    }

    async function resetLottery() {
        if (!confirm("確定要重置所有得獎紀錄嗎？")) return;
        await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "reset" }) });
        location.reload();
    }

    document.getElementById("nextPrizeBtn").addEventListener("click", prepareNextPrize);
    document.getElementById("drawBtn").addEventListener("click", drawLottery);
    document.getElementById("resetBtn").addEventListener("click", resetLottery);
    init();
</script>
</body>
</html>
