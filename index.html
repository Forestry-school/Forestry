<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 真實拉霸摸彩系統</title>
<style>
    /* ================= 基本設定 ================= */
    * { box-sizing: border-box; }
    body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: white;
        font-family: "Microsoft JhengHei", sans-serif;
        display: flex;
        min-height: 100vh;
        overflow-x: hidden;
    }
    
    /* ================= 左側主畫面 ================= */
    .main-panel {
        flex: 1;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-right: 20%;
        min-width: 0;
    }

    h1 {
        color: gold;
        font-size: 52px;
        margin: 0 0 20px 0;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }

    .btn-group {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }

    button {
        padding: 16px 36px;
        border: none;
        border-radius: 12px;
        font-size: 24px;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.1s;
    }
    button:active { transform: scale(0.95); }
    #drawBtn { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4); }
    #drawBtn:disabled { background: #555; color: #888; cursor: not-allowed; box-shadow: none; }
    #resetBtn { background: linear-gradient(135deg, #ff004c, #cc003d); color: white; }

    #currentPrize {
        color: #fff;
        font-size: 30px;
        margin-bottom: 30px;
        background: rgba(255, 215, 0, 0.15);
        padding: 12px 35px;
        border-radius: 50px;
        border: 1px solid gold;
    }

    /* ================= 核心：擬真拉霸機台 ================= */
    .slot-machine-container {
        background: #1a1a1a;
        padding: 30px;
        border-radius: 20px;
        border: 6px solid #333;
        box-shadow: inset 0 0 30px #000, 0 10px 40px rgba(0,0,0,0.8);
        width: 100%;
        margin-bottom: 40px;
    }

    #slotMachine {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px; 
        /* 【關鍵修改】 (115px * 10個) + (12px * 9個間距) = 1258px */
        /* 這樣設定可以強制第 11 個必定換行，完美達成一列最多 10 個 */
        max-width: 1258px; 
        margin: 0 auto;
    }

    /* 單一滾輪設計 */
    .reel {
        width: 115px; 
        height: 115px; 
        box-sizing: content-box; 
        overflow: hidden;
        border-radius: 12px;
        position: relative;
        background: linear-gradient(to bottom, #f9f9f9, #d9d9d9);
        border: 3px solid #000;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    
    .reel::after {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.7) 100%);
        pointer-events: none;
        z-index: 2;
    }

    .reel-inner {
        display: flex;
        flex-direction: column;
    }

    .slot-name {
        width: 100%;
        height: 115px; /* 必須與 .reel 高度完全一致 */
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px; 
        font-weight: 900;
        color: #111;
    }

    .slot-winner-name {
        color: #d10000; 
        font-size: 38px; 
    }

    /* ================= 名單區 ================= */
    h2 { color: #00e5ff; margin-top: 20px; text-align: center; }
    
    #winnerList {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
        margin-bottom: 40px;
    }
    .winner-item {
        background: rgba(255, 215, 0, 0.1);
        border: 2px solid gold;
        border-radius: 12px;
        padding: 12px 24px;
        color: gold;
        font-size: 26px;
        font-weight: bold;
    }

    #remainList {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
    }
    .remain-item {
        padding: 8px 14px;
        background: #111;
        border: 1px solid #333;
        border-radius: 8px;
        color: #777;
        font-size: 14px;
    }

    /* ================= 右側：全部得獎名單 ================= */
    .right-panel {
        position: fixed;
        right: 0;
        top: 0;
        width: 20%;
        height: 100vh;
        overflow-y: auto;
        background: #151515;
        border-left: 2px solid #333;
        padding: 30px 15px;
    }
    .right-panel h2 { color: gold; font-size: 24px; border-bottom: 2px solid gold; padding-bottom: 15px; margin-top: 0; }
    .allWinner { padding: 15px 0; border-bottom: 1px solid #2a2a2a; }
    .prize-title { color: gold; font-size: 22px; margin-bottom: 10px; font-weight: bold; }
    .prize-names { color: #ddd; line-height: 1.8; font-size: 18px; }

</style>
</head>
<body>

    <div class="main-panel">
        <h1>🎰 謝師宴拉霸摸彩 🎰</h1>

        <div class="btn-group">
            <button id="drawBtn">開始抽獎</button>
            <button id="resetBtn">重置所有抽獎</button>
        </div>

        <div id="currentPrize">讀取中...</div>

        <div class="slot-machine-container">
            <div id="slotMachine"></div>
        </div>

        <h2 class="winner-title">🏆 本輪得獎者</h2>
        <div id="winnerList"></div>

        <h2 class="remain-title">🎯 尚未抽中名單</h2>
        <div id="remainList"></div>
    </div>

    <div class="right-panel">
        <h2>📜 所有得獎名單</h2>
        <div id="allWinnerList"></div>
    </div>

    <audio id="spinSound" preload="auto">
        <source src="souce.m4a" type="audio/mp4">
    </audio>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyDm_9tAXT6vwCmqkpnLfecoukALyiVIRxkY5QubO3X8EMbbqIMmHnsG7p0AZza3q8/exec';

    let people = [];
    let prizes = [];
    let winners = [];
    let currentPrizeIndex = 0;

    // ★ 這裡同步改為 115，確保字體對齊正中間
    const SLOT_HEIGHT = 115; 
    const TOTAL_FAKE_NAMES = 30; 

    async function init() {
        const response = await fetch(API_URL);
        const data = await response.json();
        people = data.people;
        prizes = data.prizes;
        winners = data.winners;

        findCurrentPrize();
        renderAllWinners();
        renderRemainList();
        showCurrentPrize();
    }

    function findCurrentPrize() {
        let counter = {};
        winners.forEach(w => {
            if (!counter[w.prize]) counter[w.prize] = 0;
            counter[w.prize]++;
        });

        for (let i = 0; i < prizes.length; i++) {
            const prizeName = prizes[i]["獎項"];
            const total = parseInt(prizes[i]["人數"]);
            const current = counter[prizeName] || 0;
            if (current < total) {
                currentPrizeIndex = i;
                break;
            }
        }
    }

    function showCurrentPrize() {
        if (currentPrizeIndex >= prizes.length) {
            document.getElementById("currentPrize").innerText = "🎉 所有獎項已抽完";
            document.getElementById("drawBtn").disabled = true;
            return;
        }
        const prize = prizes[currentPrizeIndex];
        document.getElementById("currentPrize").innerText = `🎁 目前抽：${prize["獎項"]}（${prize["人數"]}人）`;
    }

    function getAvailablePeople() {
        const winnerNames = winners.map(w => w.name);
        return people.filter(p => !winnerNames.includes(p["姓名"]));
    }

    function renderRemainList() {
        const remain = getAvailablePeople();
        const div = document.getElementById("remainList");
        div.innerHTML = "";
        remain.forEach(person => {
            div.innerHTML += `<div class="remain-item">${person["姓名"]}</div>`;
        });
    }

    function renderAllWinners() {
        const div = document.getElementById("allWinnerList");
        div.innerHTML = "";
        let grouped = {};
        winners.forEach(w => {
            if (!grouped[w.prize]) grouped[w.prize] = [];
            grouped[w.prize].push(w.name);
        });

        Object.keys(grouped).forEach(prize => {
            div.innerHTML += `
                <div class="allWinner">
                    <div class="prize-title">🎉 ${prize}</div>
                    <div class="prize-names">${grouped[prize].join("、")}</div>
                </div>
            `;
        });
    }

    function createSlot(nameList, winnerData) {
        const reel = document.createElement("div");
        reel.className = "reel";
        const inner = document.createElement("div");
        inner.className = "reel-inner";

        for (let i = 0; i < TOTAL_FAKE_NAMES; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            const nameStr = random ? random["姓名"] : "?";
            inner.innerHTML += `<div class="slot-name">${nameStr}</div>`;
        }

        inner.innerHTML += `<div class="slot-name slot-winner-name">${winnerData["姓名"]}</div>`;

        for (let i = 0; i < 3; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            const nameStr = random ? random["姓名"] : "?";
            inner.innerHTML += `<div class="slot-name">${nameStr}</div>`;
        }

        reel.appendChild(inner);
        return { reel, inner };
    }

    async function drawLottery() {
        const drawBtn = document.getElementById("drawBtn");
        drawBtn.disabled = true;

        const prize = prizes[currentPrizeIndex];
        const available = getAvailablePeople();
        const drawCount = Math.min(parseInt(prize["人數"]), available.length);

        if (drawCount === 0) {
            alert("目前沒有足夠的名單可以抽獎！");
            return;
        }

        const spinSound = document.getElementById("spinSound");
        spinSound.currentTime = 0;
        spinSound.play();

        let temp = [...available];
        let currentWinners = [];
        for (let i = 0; i < drawCount; i++) {
            const randomIndex = Math.floor(Math.random() * temp.length);
            currentWinners.push(temp[randomIndex]);
            temp.splice(randomIndex, 1);
        }

        const machine = document.getElementById("slotMachine");
        machine.innerHTML = "";
        let slots = [];

        for (let i = 0; i < drawCount; i++) {
            const slot = createSlot(available, currentWinners[i]);
            machine.appendChild(slot.reel);
            slots.push(slot);
        }

        void machine.offsetWidth; 

        const targetY = -(TOTAL_FAKE_NAMES * SLOT_HEIGHT);
        let maxSpinTime = 0;
        const staggerDelay = drawCount > 5 ? 0.2 : 0.5;

        slots.forEach((slot, index) => {
            const duration = 3 + (index * staggerDelay);
            if (duration > maxSpinTime) maxSpinTime = duration;
            slot.inner.style.transition = `transform ${duration}s cubic-bezier(0.1, 0.8, 0.1, 1.15)`;
            slot.inner.style.transform = `translateY(${targetY}px)`;
        });

        setTimeout(async () => {
            spinSound.pause();
            spinSound.currentTime = 0;

            const winnerList = document.getElementById("winnerList");
            winnerList.innerHTML = "";

            currentWinners.forEach(w => {
                winnerList.innerHTML += `<div class="winner-item">${w["姓名"]}</div>`;
                winners.push({ prize: prize["獎項"], name: w["姓名"] });
            });

            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({
                    prize: prize["獎項"],
                    winners: currentWinners
                })
            });

            renderAllWinners();
            renderRemainList();
            currentPrizeIndex++;
            showCurrentPrize();
            
            if (currentPrizeIndex < prizes.length) {
                drawBtn.disabled = false;
            }

        }, maxSpinTime * 1000 + 400);
    }

    async function resetLottery() {
        if (!confirm("確定重置？（這將清空 Google Sheet 紀錄）")) return;
        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "reset" })
        });
        location.reload();
    }

    document.getElementById("drawBtn").addEventListener("click", drawLottery);
    document.getElementById("resetBtn").addEventListener("click", resetLottery);

    init();
</script>
</body>
</html>
