<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 福瑞斯特謝師感恩餐會 - 8秒滿版淨空版</title>
<style>
    /* ================= 基本設定 ================= */
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0;
        background: #0a0a0a; color: white;
        font-family: "Microsoft JhengHei", sans-serif;
        display: flex; height: 100vh; overflow: hidden;
    }
    
    /* ================= 左側：拉霸主展區 (80%) ================= */
    .main-panel {
        flex: 0 0 80%;
        display: flex; flex-direction: column; align-items: center;
        padding: 40px 2%; position: relative;
        border-right: 3px solid #333;
        overflow-y: auto;
    }

    h1 {
        color: gold; font-size: 56px; margin: 0 0 30px 0;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.6); letter-spacing: 5px;
        text-align: center;
    }

    /* 中央大啟動鈕 */
    #drawBtn {
        padding: 20px 60px; border: none; border-radius: 15px;
        font-size: 32px; font-weight: bold; cursor: pointer; transition: all 0.2s;
        background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000;
        box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4); margin-bottom: 30px;
    }
    #drawBtn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 215, 0, 0.6); }
    #drawBtn:active { transform: scale(0.95); }
    #drawBtn:disabled { background: #333 !important; color: #666 !important; cursor: not-allowed !important; box-shadow: none !important; }

    #currentPrize {
        color: #fff; font-size: 36px; margin-bottom: 35px;
        background: rgba(255, 215, 0, 0.1); padding: 15px 50px;
        border-radius: 60px; border: 3px solid gold; font-weight: bold;
        min-height: 90px; display: flex; align-items: center; text-align: center;
    }

    /* 滿版 5 欄網格系統 */
    .slot-machine-container {
        background: #151515; padding: 30px; 
        border-radius: 25px; border: 8px solid #222;
        box-shadow: inset 0 0 50px #000, 0 15px 50px rgba(0,0,0,0.9);
        width: 98%; margin-bottom: 50px;
    }

    #slotMachine {
        display: grid; 
        grid-template-columns: repeat(5, 1fr); /* 強制鎖定一排 5 個 */
        gap: 20px; margin: 0 auto;
    }

    .reel {
        width: 100%; height: 140px; box-sizing: border-box; 
        overflow: hidden; border-radius: 12px; position: relative;
        background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 50%, #ffffff 100%);
        border: 4px solid #000; box-shadow: 0 5px 15px rgba(0,0,0,0.6);
    }
    
    .reel::after {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 25%, transparent 75%, rgba(0,0,0,0.8) 100%);
        pointer-events: none; z-index: 2;
    }

    .reel-inner { display: flex; flex-direction: column; }
    
    .slot-name {
        width: 100%; height: 140px; display: flex; align-items: center;
        justify-content: center; text-align: center; 
        padding: 0 15px; font-size: 36px; font-weight: 900; color: #111; 
        white-space: nowrap; overflow: hidden;
    }
    .slot-winner-name { color: #e60000; font-size: 42px; text-shadow: 1px 1px 0px rgba(255,255,255,0.8); }

    /* ================= 右側：榮譽得獎榜 (20%) ================= */
    .right-panel {
        flex: 0 0 20%; background: #111; padding: 30px 20px; overflow-y: auto;
    }
    .right-panel h2 {
        color: gold; font-size: 26px; border-bottom: 2px solid gold;
        padding-bottom: 15px; margin-top: 0;
    }
    .allWinner { padding: 15px 0; border-bottom: 1px solid #222; }
    .prize-title { color: gold; font-size: 20px; margin-bottom: 8px; font-weight: bold; }
    .prize-names { color: #ccc; line-height: 1.6; font-size: 17px; }

    /* ================= 左下角：場控控制台 ================= */
    .left-controls {
        position: fixed; bottom: 25px; left: 25px;
        display: flex; flex-direction: column; gap: 12px; z-index: 100;
    }

    #nextPrizeBtn {
        background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: white; 
        border: none; padding: 18px 35px; border-radius: 12px;
        font-size: 22px; font-weight: bold; cursor: pointer;
        box-shadow: 0 6px 15px rgba(0, 210, 255, 0.3);
    }
    #nextPrizeBtn:disabled { background: #333 !important; color: #666 !important; cursor: not-allowed !important; box-shadow: none !important; }

    #resetBtn {
        background: #444; color: #ccc; border: none;
        padding: 8px 18px; border-radius: 6px; font-size: 14px; cursor: pointer;
        width: fit-content; transition: 0.2s;
    }
    #resetBtn:hover { background: #ff4d4d; color: white; }

</style>
</head>
<body>

    <div class="left-controls">
        <button id="nextPrizeBtn" disabled>讀取資料中...</button>
        <button id="resetBtn">🔄 系統重置</button>
    </div>

    <div class="main-panel">
        <h1>🎰 福瑞斯特謝師感恩餐會 🎰</h1>
        
        <button id="drawBtn" disabled>等待鎖定獎項</button>
        
        <div id="currentPrize">正在從 Google 雲端讀取名單，請稍候...</div>

        <div class="slot-machine-container">
            <div id="slotMachine"></div>
        </div>
    </div>

    <div class="right-panel">
        <h2>📜 榮譽得獎榜</h2>
        <div id="allWinnerList"></div>
    </div>

    <audio id="spinSound" preload="auto">
        <source src="souce.m4a" type="audio/mp4">
    </audio>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyDm_9tAXT6vwCmqkpnLfecoukALyiVIRxkY5QubO3X8EMbbqIMmHnsG7p0AZza3q8/exec';

    let people = [];
    let prizes = [];
    let winners = [];
    let currentPrizeIndex = -1;
    let isDataLoaded = false;

    const SLOT_HEIGHT = 140; 
    const TOTAL_FAKE_NAMES = 50; // 調整假名數配合 8 秒轉速

    async function init() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            people = data.people;
            prizes = data.prizes;
            winners = data.winners;

            isDataLoaded = true;
            document.getElementById("nextPrizeBtn").disabled = false;
            document.getElementById("nextPrizeBtn").innerText = "🔍 鎖定下個獎項";
            document.getElementById("currentPrize").innerText = "資料讀取完畢，請點擊左下角「鎖定下個獎項」";
            
            renderAllWinners();
        } catch (e) {
            document.getElementById("currentPrize").innerText = "❌ 資料讀取失敗，請檢查網路或 API";
        }
    }

    function prepareNextPrize() {
        if (!isDataLoaded) return;

        let counter = {};
        winners.forEach(w => {
            if (!counter[w.prize]) counter[w.prize] = 0;
            counter[w.prize]++;
        });

        let found = false;
        for (let i = 0; i < prizes.length; i++) {
            const prizeName = prizes[i]["獎項"];
            const total = parseInt(prizes[i]["人數"]);
            const current = counter[prizeName] || 0;
            if (current < total) {
                currentPrizeIndex = i;
                found = true;
                break;
            }
        }

        const display = document.getElementById("currentPrize");
        const drawBtn = document.getElementById("drawBtn");
        const nextBtn = document.getElementById("nextPrizeBtn");

        if (found) {
            const prize = prizes[currentPrizeIndex];
            display.innerText = `🎁 目前抽：${prize["獎項"]} (${prize["人數"]}人)`;
            drawBtn.disabled = false;
            drawBtn.innerText = "🎰 啟動拉霸，好運降臨！";
            nextBtn.disabled = true; 
            document.getElementById("slotMachine").innerHTML = ""; 
        } else {
            display.innerText = "🎉 所有獎項已全部抽完！";
            drawBtn.disabled = true;
            nextBtn.disabled = true;
        }
    }

    function getAvailablePeople() {
        const winnerNames = winners.map(w => w.name);
        return people.filter(p => !winnerNames.includes(p["姓名"]));
    }

    function renderAllWinners() {
        const div = document.getElementById("allWinnerList");
        div.innerHTML = "";
        let grouped = {};
        winners.forEach(w => {
            if (!grouped[w.prize]) grouped[w.prize] = [];
            grouped[w.prize].push(w.name);
        });

        Object.keys(grouped).forEach(prize => {
            div.innerHTML += `
                <div class="allWinner">
                    <div class="prize-title">🎉 ${prize}</div>
                    <div class="prize-names">${grouped[prize].join("、")}</div>
                </div>
            `;
        });
    }

    function createSlot(nameList, winnerData) {
        const reel = document.createElement("div");
        reel.className = "reel";
        const inner = document.createElement("div");
        inner.className = "reel-inner";

        for (let i = 0; i < TOTAL_FAKE_NAMES; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            const nameStr = random ? random["姓名"] : "?";
            inner.innerHTML += `<div class="slot-name">${nameStr}</div>`;
        }
        inner.innerHTML += `<div class="slot-name slot-winner-name">${winnerData["姓名"]}</div>`;
        for (let i = 0; i < 3; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            const nameStr = random ? random["姓名"] : "?";
            inner.innerHTML += `<div class="slot-name">${nameStr}</div>`;
        }
        reel.appendChild(inner);
        return { reel, inner };
    }

    async function drawLottery() {
        const drawBtn = document.getElementById("drawBtn");
        drawBtn.disabled = true;
        drawBtn.innerText = "🚀 運轉中...";

        const prize = prizes[currentPrizeIndex];
        const available = getAvailablePeople();
        const drawCount = Math.min(parseInt(prize["人數"]), available.length);

        if (drawCount === 0) return;

        const spinSound = document.getElementById("spinSound");
        spinSound.currentTime = 0;
        spinSound.play();

        let temp = [...available];
        let currentWinners = [];
        for (let i = 0; i < drawCount; i++) {
            const randomIndex = Math.floor(Math.random() * temp.length);
            currentWinners.push(temp[randomIndex]);
            temp.splice(randomIndex, 1);
        }

        const machine = document.getElementById("slotMachine");
        machine.innerHTML = "";
        let slots = [];

        for (let i = 0; i < drawCount; i++) {
            const slot = createSlot(available, currentWinners[i]);
            machine.appendChild(slot.reel);
            slots.push(slot);
        }
