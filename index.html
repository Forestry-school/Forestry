<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 福瑞斯特謝師感恩餐會 - 橫向併排精鍊版</title>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0;
        background: #000; color: white;
        font-family: "Microsoft JhengHei", sans-serif;
        display: flex; height: 100vh; overflow: hidden;
    }
    
    /* 左側主區 */
    .left-panel {
        flex: 0 0 80%;
        display: flex; flex-direction: column; align-items: center;
        padding: 20px; border-right: 2px solid #222;
    }

    h1 {
        color: gold; font-size: 45px; margin: 0 0 15px 0;
        text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); letter-spacing: 8px;
    }

    /* 頂部併排控制列 */
    .control-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        width: 100%;
        margin-bottom: 20px;
        background: rgba(255, 255, 255, 0.05);
        padding: 15px;
        border-radius: 15px;
    }

    #nextPrizeBtn {
        background: #0077b6; color: white; border: none; padding: 12px 25px;
        border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer;
        transition: 0.2s; white-space: nowrap;
    }
    #nextPrizeBtn:hover:not(:disabled) { background: #0096c7; transform: scale(1.05); }
    #nextPrizeBtn:disabled { background: #333; color: #666; cursor: not-allowed; }

    #currentPrize {
        color: #fff; font-size: 28px; font-weight: bold;
        background: rgba(255, 215, 0, 0.1); padding: 10px 40px;
        border-radius: 50px; border: 2px solid gold;
        min-width: 350px; text-align: center;
    }

    #drawBtn {
        padding: 12px 50px; border: none; border-radius: 10px;
        font-size: 24px; font-weight: bold; cursor: pointer; transition: 0.2s;
        background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000;
        white-space: nowrap;
    }
    #drawBtn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
    #drawBtn:disabled { background: #444; color: #777; cursor: not-allowed; }

    /* 拉霸機台 */
    .slot-machine-container {
        width: 100%; padding: 20px;
        background: #111; border-radius: 20px; border: 4px solid #333;
        box-shadow: inset 0 0 50px #000;
    }

    #slotMachine {
        display: grid; 
        grid-template-columns: repeat(5, 1fr); 
        gap: 15px;
    }

    .reel {
        height: 150px; overflow: hidden; border-radius: 10px; position: relative;
        background: linear-gradient(to bottom, #fff 0%, #ccc 50%, #fff 100%);
        border: 3px solid #000;
    }
    
    .reel::after {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 35%, transparent 65%, rgba(0,0,0,0.5) 100%);
        pointer-events: none; z-index: 2;
    }

    .reel-inner { display: flex; flex-direction: column; }
    .slot-name {
        width: 100%; height: 150px; display: flex; align-items: center;
        justify-content: center; text-align: center; 
        font-size: 36px; font-weight: 900; color: #111;
    }
    .slot-winner-name { color: #d00000; font-size: 42px; }

    /* 右側面板 */
    .right-panel {
        flex: 0 0 20%; background: #0a0a0a; padding: 20px; overflow-y: auto;
        display: flex; flex-direction: column;
    }
    
    .right-header {
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 2px solid gold; padding-bottom: 10px; margin-bottom: 15px;
    }

    .right-panel h2 { color: gold; font-size: 22px; margin: 0; }
    
    #resetBtn {
        background: #333; color: #aaa; border: none; padding: 5px 10px;
        border-radius: 5px; cursor: pointer; font-size: 12px;
    }
    #resetBtn:hover { background: #900; color: white; }

    .allWinner { padding: 10px 0; border-bottom: 1px solid #222; }
    .prize-title { color: gold; font-size: 18px; font-weight: bold; }
    .prize-names { color: #bbb; font-size: 15px; line-height: 1.4; margin-top: 5px; }

</style>
</head>
<body>

    <div class="left-panel">
        <h1>🎰 福瑞斯特謝師感恩餐會</h1>
        
        <div class="control-bar">
            <button id="nextPrizeBtn" disabled>讀取名單...</button>
            <div id="currentPrize">請點擊左側「鎖定」</div>
            <button id="drawBtn" disabled>等待開獎</button>
        </div>

        <div class="slot-machine-container">
            <div id="slotMachine"></div>
        </div>
    </div>

    <div class="right-panel">
        <div class="right-header">
            <h2>📜 榮譽得獎榜</h2>
            <button id="resetBtn">🔄 重置</button>
        </div>
        <div id="allWinnerList"></div>
    </div>

    <audio id="spinSound" preload="auto">
        <source src="souce.m4a" type="audio/mp4">
    </audio>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyDm_9tAXT6vwCmqkpnLfecoukALyiVIRxkY5QubO3X8EMbbqIMmHnsG7p0AZza3q8/exec';

    let people = [];
    let prizes = [];
    let winners = [];
    let currentPrizeIndex = -1;
    const SLOT_HEIGHT = 150; 
    const TOTAL_FAKE_NAMES = 60; 

    async function init() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            people = data.people;
            prizes = data.prizes;
            winners = data.winners;
            document.getElementById("nextPrizeBtn").disabled = false;
            document.getElementById("nextPrizeBtn").innerText = "🔍 鎖定下個獎項";
            renderAllWinners();
        } catch (e) {
            document.getElementById("currentPrize").innerText = "❌ 連線異常";
        }
    }

    function renderAllWinners() {
        const div = document.getElementById("allWinnerList");
        div.innerHTML = "";
        let grouped = {};
        winners.forEach(w => {
            if (!grouped[w.prize]) grouped[w.prize] = [];
            grouped[w.prize].push(w.name);
        });
        Object.keys(grouped).forEach(prize => {
            div.innerHTML += `<div class="allWinner"><div class="prize-title">🎉 ${prize}</div><div class="prize-names">${grouped[prize].join("、")}</div></div>`;
        });
    }

    function prepareNextPrize() {
        let counter = {};
        winners.forEach(w => {
            if (!counter[w.prize]) counter[w.prize] = 0;
            counter[w.prize]++;
        });

        let found = false;
        for (let i = 0; i < prizes.length; i++) {
            const prizeName = prizes[i]["獎項"];
            const total = parseInt(prizes[i]["人數"]);
            if ((counter[prizeName] || 0) < total) {
                currentPrizeIndex = i;
                found = true;
                break;
            }
        }

        if (found) {
            const prize = prizes[currentPrizeIndex];
            document.getElementById("currentPrize").innerText = `🎁 ${prize["獎項"]} (${prize["人數"]}人)`;
            document.getElementById("drawBtn").disabled = false;
            document.getElementById("drawBtn").innerText = "🎰 開始抽獎";
            document.getElementById("nextPrizeBtn").disabled = true;
            document.getElementById("slotMachine").innerHTML = ""; 
        } else {
            document.getElementById("currentPrize").innerText = "🎊 圓滿結束 🎊";
        }
    }

    function createSlot(nameList, winnerData) {
        const reel = document.createElement("div");
        reel.className = "reel";
        const inner = document.createElement("div");
        inner.className = "reel-inner";
        for (let i = 0; i < TOTAL_FAKE_NAMES; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            inner.innerHTML += `<div class="slot-name">${random ? random["姓名"] : "---"}</div>`;
        }
        inner.innerHTML += `<div class="slot-name slot-winner-name">${winnerData["姓名"]}</div>`;
        for (let i = 0; i < 3; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            inner.innerHTML += `<div class="slot-name">${random ? random["姓名"] : "---"}</div>`;
        }
        reel.appendChild(inner);
        return { reel, inner };
    }

    async function drawLottery() {
        const spinSound = document.getElementById("spinSound");
        const drawBtn = document.getElementById("drawBtn");
        drawBtn.disabled = true;
        drawBtn.innerText = "🚀 抽獎中...";

        const prize = prizes[currentPrizeIndex];
        const winnerNames = winners.map(w => w.name);
        const available = people.filter(p => !winnerNames.includes(p["姓名"]));
        const drawCount = Math.min(parseInt(prize["人數"]), available.length);

        spinSound.currentTime = 0;
        spinSound.play();

        let currentWinners = [];
        let temp = [...available];
        for (let i = 0; i < drawCount; i++) {
            const idx = Math.floor(Math.random() * temp.length);
            currentWinners.push(temp[idx]);
            temp.splice(idx, 1);
        }

        const machine = document.getElementById("slotMachine");
        machine.innerHTML = "";
        let slots = [];
        for (let i = 0; i < drawCount; i++) {
            const slot = createSlot(available, currentWinners[i]);
            machine.appendChild(slot.reel);
            slots.push(slot);
        }

        void machine.offsetWidth; 
        const targetY = -(TOTAL_FAKE_NAMES * SLOT_HEIGHT);

        slots.forEach(slot => {
            slot.inner.style.transition = `transform 8s cubic-bezier(0.1, 0, 0.1, 1)`;
            slot.inner.style.transform = `translateY(${targetY}px)`;
        });

        setTimeout(async () => {
            spinSound.pause(); // 抽完立即停音
            spinSound.currentTime = 0;

            currentWinners.forEach(w => winners.push({ prize: prize["獎項"], name: w["姓名"] }));
            renderAllWinners();
            fetch(API_URL, { method: "POST", body: JSON.stringify({ prize: prize["獎項"], winners: currentWinners }) });
            
            document.getElementById("nextPrizeBtn").disabled = false;
            drawBtn.innerText = "開獎完成";
        }, 8000); 
    }

    document.getElementById("nextPrizeBtn").addEventListener("click", prepareNextPrize);
    document.getElementById("drawBtn").addEventListener("click", drawLottery);
    document.getElementById("resetBtn").addEventListener("click", async () => {
        if(confirm("重置將清除所有紀錄，確定嗎？")) {
            await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "reset" }) });
            location.reload();
        }
    });
    init();
</script>
</body>
</html>
