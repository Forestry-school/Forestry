<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 福瑞斯特謝師感恩餐會 </title>
<style>
    /* ================= 基本設定 ================= */
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0;
        background: #000; color: white;
        font-family: "Microsoft JhengHei", sans-serif;
        display: flex; height: 100vh; overflow: hidden;
    }
    
    /* ================= 左側：主拉霸區 (80%) ================= */
    .left-panel {
        flex: 0 0 82%; /* 稍微加寬左側 */
        display: flex; flex-direction: column; align-items: center;
        padding: 20px; position: relative;
        border-right: 2px solid #222;
    }

    /* 標題樣式 */
    h1 {
        color: gold; font-size: 50px; margin: 0 0 20px 0;
        text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); letter-spacing: 10px;
    }

    /* 頂部控制列：併排核心設定 */
    .top-controls-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        width: 100%;
        margin-bottom: 25px;
    }

    #nextPrizeBtn {
        background: #0077b6; color: white; border: none; padding: 15px 30px;
        border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: 0.2s;
        white-space: nowrap;
    }
    #nextPrizeBtn:hover:not(:disabled) { background: #0096c7; transform: translateY(-2px); }
    #nextPrizeBtn:disabled { background: #333; color: #666; cursor: not-allowed; }

    #currentPrize {
        color: #fff; font-size: 32px; font-weight: bold;
        background: rgba(255, 215, 0, 0.1); padding: 12px 50px;
        border-radius: 50px; border: 3px solid gold;
        min-width: 400px; text-align: center;
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
    }

    #drawBtn {
        padding: 15px 80px; border: none; border-radius: 15px;
        font-size: 32px; font-weight: bold; cursor: pointer; transition: 0.2s;
        background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000;
        box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
    }
    #drawBtn:hover:not(:disabled) { transform: scale(1.03); box-shadow: 0 0 40px rgba(255, 215, 0, 0.5); }
    #drawBtn:disabled { background: #444; color: #777; cursor: not-allowed; box-shadow: none; }

    /* 寬版拉霸機台容器 */
    .slot-machine-container {
        width: 98%; padding: 25px;
        background: #111; border-radius: 25px; border: 5px solid #333;
        box-shadow: inset 0 0 100px #000;
        margin-top: 10px;
    }

    #slotMachine {
        display: grid; 
        grid-template-columns: repeat(5, 1fr); 
        gap: 15px;
    }

    .reel {
        height: 160px; overflow: hidden; border-radius: 15px; position: relative;
        background: linear-gradient(to bottom, #fff 0%, #ddd 50%, #fff 100%);
        border: 4px solid #000;
    }
    
    .reel::after {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 35%, transparent 65%, rgba(0,0,0,0.6) 100%);
        pointer-events: none; z-index: 2;
    }

    .reel-inner { display: flex; flex-direction: column; }
    .slot-name {
        width: 100%; height: 160px; display: flex; align-items: center;
        justify-content: center; text-align: center; 
        font-size: 38px; font-weight: 900; color: #111;
    }
    .slot-winner-name { color: #e60000; font-size: 45px; }

    /* ================= 右側：榮譽榜 (18%) ================= */
    .right-panel {
        flex: 0 0 18%; background: #0a0a0a; padding: 20px; overflow-y: auto;
    }
    .right-panel h2 {
        color: gold; font-size: 24px; border-bottom: 2px solid gold;
        padding-bottom: 10px; margin-top: 0; text-align: center;
    }
    .allWinner { padding: 12px 0; border-bottom: 1px solid #222; }
    .prize-title { color: gold; font-size: 18px; font-weight: bold; margin-bottom: 5px; }
    .prize-names { color: #bbb; font-size: 16px; line-height: 1.5; }

    /* 重置按鈕隱藏在角落 */
    #resetBtn {
        position: fixed; bottom: 10px; left: 10px;
        background: transparent; color: #222; border: 1px solid #111;
        padding: 5px 10px; border-radius: 4px; font-size: 10px; cursor: pointer;
    }
    #resetBtn:hover { color: #555; }

</style>
</head>
<body>

    <button id="resetBtn">🔄 重置系統</button>

    <div class="left-panel">
        <h1>🎰 福瑞斯特謝師感恩餐會</h1>
        
        <div class="top-controls-bar">
            <button id="nextPrizeBtn" disabled>讀取中...</button>
            <div id="currentPrize">等待鎖定獎項</div>
            <button id="drawBtn" disabled>準備開獎</button>
        </div>

        <div class="slot-machine-container">
            <div id="slotMachine"></div>
        </div>
    </div>

    <div class="right-panel">
        <h2>📜 榮譽得獎榜</h2>
        <div id="allWinnerList"></div>
    </div>

    <audio id="spinSound" preload="auto">
        <source src="souce.m4a" type="audio/mp4">
    </audio>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyDm_9tAXT6vwCmqkpnLfecoukALyiVIRxkY5QubO3X8EMbbqIMmHnsG7p0AZza3q8/exec';

    let people = [];
    let prizes = [];
    let winners = [];
    let currentPrizeIndex = -1;
    const SLOT_HEIGHT = 160; 
    const TOTAL_FAKE_NAMES = 60; 

    async function init() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            people = data.people;
            prizes = data.prizes;
            winners = data.winners;
            document.getElementById("nextPrizeBtn").disabled = false;
            document.getElementById("nextPrizeBtn").innerText = "🔍 鎖定下個獎項";
            renderAllWinners();
        } catch (e) {
            document.getElementById("currentPrize").innerText = "❌ 資料載入失敗";
        }
    }

    function renderAllWinners() {
        const div = document.getElementById("allWinnerList");
        div.innerHTML = "";
        let grouped = {};
        winners.forEach(w => {
            if (!grouped[w.prize]) grouped[w.prize] = [];
            grouped[w.prize].push(w.name);
        });
        Object.keys(grouped).forEach(prize => {
            div.innerHTML += `<div class="allWinner"><div class="prize-title">🎉 ${prize}</div><div class="prize-names">${grouped[prize].join("、")}</div></div>`;
        });
    }

    function prepareNextPrize() {
        let counter = {};
        winners.forEach(w => {
            if (!counter[w.prize]) counter[w.prize] = 0;
            counter[w.prize]++;
        });

        let found = false;
        for (let i = 0; i < prizes.length; i++) {
            const prizeName = prizes[i]["獎項"];
            const total = parseInt(prizes[i]["人數"]);
            if ((counter[prizeName] || 0) < total) {
                currentPrizeIndex = i;
                found = true;
                break;
            }
        }

        if (found) {
            const prize = prizes[currentPrizeIndex];
            document.getElementById("currentPrize").innerText = `🎁 ${prize["獎項"]} (${prize["人數"]}人)`;
            document.getElementById("drawBtn").disabled = false;
            document.getElementById("drawBtn").innerText = "🎰 開始抽獎";
            document.getElementById("nextPrizeBtn").disabled = true;
            document.getElementById("slotMachine").innerHTML = ""; 
        } else {
            document.getElementById("currentPrize").innerText = "🎉 抽獎完畢！";
            document.getElementById("drawBtn").disabled = true;
        }
    }

    function createSlot(nameList, winnerData) {
        const reel = document.createElement("div");
        reel.className = "reel";
        const inner = document.createElement("div");
        inner.className = "reel-inner";
        for (let i = 0; i < TOTAL_FAKE_NAMES; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            inner.innerHTML += `<div class="slot-name">${random ? random["姓名"] : "---"}</div>`;
        }
        inner.innerHTML += `<div class="slot-name slot-winner-name">${winnerData["姓名"]}</div>`;
        for (let i = 0; i < 3; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            inner.innerHTML += `<div class="slot-name">${random ? random["姓名"] : "---"}</div>`;
        }
        reel.appendChild(inner);
        return { reel, inner };
    }

    async function drawLottery() {
        const spinSound = document.getElementById("spinSound");
        const drawBtn = document.getElementById("drawBtn");
        drawBtn.disabled = true;
        drawBtn.innerText = "🚀 運轉中";

        const prize = prizes[currentPrizeIndex];
        const winnerNames = winners.map(w => w.name);
        const available = people.filter(p => !winnerNames.includes(p["姓名"]));
        const drawCount = Math.min(parseInt(prize["人數"]), available.length);

        spinSound.currentTime = 0;
        spinSound.play();

        let currentWinners = [];
        let temp = [...available];
        for (let i = 0; i < drawCount; i++) {
            const idx = Math.floor(Math.random() * temp.length);
            currentWinners.push(temp[idx]);
            temp.splice(idx, 1);
        }

        const machine = document.getElementById("slotMachine");
        machine.innerHTML = "";
        let slots = [];
        for (let i = 0; i < drawCount; i++) {
            const slot = createSlot(available, currentWinners[i]);
            machine.appendChild(slot.reel);
            slots.push(slot);
        }

        void machine.offsetWidth; 
        const targetY = -(TOTAL_FAKE_NAMES * SLOT_HEIGHT);

        slots.forEach(slot => {
            slot.inner.style.transition = `transform 8s cubic-bezier(0.1, 0, 0.1, 1)`;
            slot.inner.style.transform = `translateY(${targetY}px)`;
        });

        setTimeout(async () => {
            // 動畫結束，立即停音
            spinSound.pause();
            spinSound.currentTime = 0;

            currentWinners.forEach(w => winners.push({ prize: prize["獎項"], name: w["姓名"] }));
            renderAllWinners();
            fetch(API_URL, { method: "POST", body: JSON.stringify({ prize: prize["獎項"], winners: currentWinners }) });
            
            document.getElementById("nextPrizeBtn").disabled = false;
            drawBtn.innerText = "本輪結束";
        }, 8000); 
    }

    document.getElementById("nextPrizeBtn").addEventListener("click", prepareNextPrize);
    document.getElementById("drawBtn").addEventListener("click", drawLottery);
    document.getElementById("resetBtn").addEventListener("click", async () => {
        if(confirm("確定重置？")) {
            await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "reset" }) });
            location.reload();
        }
    });
    init();
</script>
</body>
</html>
