<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 福瑞斯特謝師感恩餐會 - 震撼滿版版</title>
<style>
    /* ================= 基本設定 ================= */
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0;
        background: #000; color: white;
        font-family: "Microsoft JhengHei", sans-serif;
        display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden;
    }
    
    /* ================= 主畫面區域：滿版設定 ================= */
    .main-panel {
        width: 100vw; flex: 1; padding: 20px 4%;
        display: flex; flex-direction: column; align-items: center;
        justify-content: flex-start;
    }

    h1 {
        color: gold; font-size: clamp(40px, 6vw, 70px); margin: 10px 0;
        text-shadow: 0 0 30px rgba(255, 215, 0, 0.8); letter-spacing: 8px;
        text-align: center;
    }

    /* 中央啟動鈕：加大加強感 */
    #drawBtn {
        padding: 25px 80px; border: none; border-radius: 20px;
        font-size: 36px; font-weight: bold; cursor: pointer; transition: all 0.2s;
        background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000;
        box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
        margin-bottom: 20px; z-index: 10;
    }
    #drawBtn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 60px rgba(255, 215, 0, 0.6); }
    #drawBtn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }

    #currentPrize {
        color: #fff; font-size: clamp(24px, 4vw, 36px); margin-bottom: 20px;
        background: rgba(255, 215, 0, 0.15); padding: 15px 60px;
        border-radius: 50px; border: 3px solid gold; font-weight: bold;
        box-shadow: inset 0 0 20px rgba(255,215,0,0.2);
    }

    /* ================= 核心：滿版 5 欄網格 ================= */
    .slot-machine-container {
        background: #111; padding: 30px; border-radius: 30px; border: 6px solid #222;
        box-shadow: inset 0 0 60px #000, 0 0 40px rgba(0,0,0,0.5); 
        width: 100%; max-width: 1800px; /* 擴展最大寬度 */
    }

    #slotMachine {
        display: grid; 
        grid-template-columns: repeat(5, 1fr); /* 鎖定 5 欄 */
        gap: 20px; 
        justify-items: center;
    }

    .reel {
        width: 100%; max-width: 300px; height: 140px; /* 寬度隨容器，高度加大 */
        overflow: hidden; border-radius: 15px; position: relative;
        background: linear-gradient(to bottom, #ffffff 0%, #d0d0d0 50%, #ffffff 100%);
        border: 4px solid #000; box-shadow: 0 6px 15px rgba(0,0,0,0.6);
    }
    
    .reel::after {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.6) 100%);
        pointer-events: none; z-index: 2;
    }

    .reel-inner { display: flex; flex-direction: column; }
    .slot-name {
        width: 100%; height: 140px; display: flex; align-items: center;
        justify-content: center; text-align: center; 
        font-size: clamp(24px, 3vw, 40px); font-weight: 900; color: #222;
    }
    .slot-winner-name { color: #d00000; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }

    /* ================= 左下角控制區 ================= */
    .left-controls {
        position: fixed; bottom: 25px; left: 25px;
        display: flex; flex-direction: column; gap: 10px; z-index: 100;
    }

    #nextPrizeBtn {
        background: #0088cc; color: white; border: none; padding: 18px 30px;
        border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer;
        box-shadow: 0 5px 20px rgba(0,0,0,0.4);
    }

    #resetBtn {
        background: transparent; color: #444; border: 1px solid #333;
        padding: 8px 15px; border-radius: 5px; font-size: 13px; cursor: pointer;
        opacity: 0.5; width: fit-content;
    }
    #resetBtn:hover { opacity: 1; color: #ff4d4d; border-color: #ff4d4d; }

    /* ================= 下方榜單 (不再擋在右邊) ================= */
    .bottom-panel {
        width: 100%; padding: 40px; background: #0a0a0a; border-top: 2px solid #222;
    }
    .bottom-panel h2 { color: gold; font-size: 32px; text-align: center; border-bottom: 2px solid gold; padding-bottom: 10px; }
    .winner-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;
    }
    .allWinner { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
    .prize-title { color: gold; font-size: 20px; font-weight: bold; margin-bottom: 8px; }
    .prize-names { color: #ccc; font-size: 18px; line-height: 1.4; }

</style>
</head>
<body>

    <div class="left-controls">
        <button id="nextPrizeBtn" disabled>讀取中...</button>
        <button id="resetBtn">🔄 系統重置</button>
    </div>

    <div class="main-panel">
        <h1>🎰 福瑞斯特謝師感恩餐會</h1>
        <button id="drawBtn" disabled>等待連線</button>
        <div id="currentPrize">初始化中...</div>

        <div class="slot-machine-container">
            <div id="slotMachine"></div>
        </div>
    </div>

    <div class="bottom-panel">
        <h2>📜 榮譽得獎榜</h2>
        <div id="allWinnerList" class="winner-grid"></div>
    </div>

    <audio id="spinSound" preload="auto">
        <source src="souce.m4a" type="audio/mp4">
    </audio>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyDm_9tAXT6vwCmqkpnLfecoukALyiVIRxkY5QubO3X8EMbbqIMmHnsG7p0AZza3q8/exec';

    let people = [];
    let prizes = [];
    let winners = [];
    let currentPrizeIndex = -1;
    let isDataLoaded = false;
    const SLOT_HEIGHT = 140; // 配合 CSS 加大的高度
    const TOTAL_FAKE_NAMES = 65; 

    async function init() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            people = data.people;
            prizes = data.prizes;
            winners = data.winners;
            isDataLoaded = true;
            document.getElementById("nextPrizeBtn").disabled = false;
            document.getElementById("nextPrizeBtn").innerText = "🔍 鎖定下個獎項";
            document.getElementById("currentPrize").innerText = "請點擊下方按鈕開始";
            renderAllWinners();
        } catch (e) {
            document.getElementById("currentPrize").innerText = "❌ 連線失敗";
        }
    }

    function renderAllWinners() {
        const div = document.getElementById("allWinnerList");
        div.innerHTML = "";
        let grouped = {};
        winners.forEach(w => {
            if (!grouped[w.prize]) grouped[w.prize] = [];
            grouped[w.prize].push(w.name);
        });
        Object.keys(grouped).forEach(prize => {
            div.innerHTML += `
                <div class="allWinner">
                    <div class="prize-title">🎉 ${prize}</div>
                    <div class="prize-names">${grouped[prize].join("、")}</div>
                </div>
            `;
        });
    }

    function prepareNextPrize() {
        if (!isDataLoaded) return;
        let counter = {};
        winners.forEach(w => {
            if (!counter[w.prize]) counter[w.prize] = 0;
            counter[w.prize]++;
        });

        let found = false;
        for (let i = 0; i < prizes.length; i++) {
            const prizeName = prizes[i]["獎項"];
            const total = parseInt(prizes[i]["人數"]);
            const current = counter[prizeName] || 0;
            if (current < total) {
                currentPrizeIndex = i;
                found = true;
                break;
            }
        }

        const display = document.getElementById("currentPrize");
        const drawBtn = document.getElementById("drawBtn");
        const nextBtn = document.getElementById("nextPrizeBtn");

        if (found) {
            const prize = prizes[currentPrizeIndex];
            display.innerText = `🎁 目前抽：${prize["獎項"]} (${prize["人數"]}人)`;
            drawBtn.disabled = false;
            drawBtn.innerText = "🎰 釋放好運 (開始拉霸)";
            nextBtn.disabled = true; 
            document.getElementById("slotMachine").innerHTML = ""; 
        } else {
            display.innerText = "🎉 抽獎全部結束！";
            drawBtn.disabled = true;
            nextBtn.disabled = true;
        }
    }

    function createSlot(nameList, winnerData) {
        const reel = document.createElement("div");
        reel.className = "reel";
        const inner = document.createElement("div");
        inner.className = "reel-inner";
        for (let i = 0; i < TOTAL_FAKE_NAMES; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            inner.innerHTML += `<div class="slot-name">${random ? random["姓名"] : "?"}</div>`;
        }
        inner.innerHTML += `<div class="slot-name slot-winner-name">${winnerData["姓名"]}</div>`;
        for (let i = 0; i < 3; i++) {
            const random = nameList[Math.floor(Math.random() * nameList.length)];
            inner.innerHTML += `<div class="slot-name">${random ? random["姓名"] : "?"}</div>`;
        }
        reel.appendChild(inner);
        return { reel, inner };
    }

    async function drawLottery() {
        const drawBtn = document.getElementById("drawBtn");
        drawBtn.disabled = true;
        drawBtn.innerText = "🚀 運轉中...";

        const prize = prizes[currentPrizeIndex];
        const winnerNames = winners.map(w => w.name);
        const available = people.filter(p => !winnerNames.includes(p["姓名"]));
        const drawCount = Math.min(parseInt(prize["人數"]), available.length);

        if (drawCount === 0) return;

        const spinSound = document.getElementById("spinSound");
        spinSound.currentTime = 0;
        spinSound.play();

        let currentWinners = [];
        let temp = [...available];
        for (let i = 0; i < drawCount; i++) {
            const idx = Math.floor(Math.random() * temp.length);
            currentWinners.push(temp[idx]);
            temp.splice(idx, 1);
        }

        const machine = document.getElementById("slotMachine");
        machine.innerHTML = "";
        let slots = [];
        for (let i = 0; i < drawCount; i++) {
            const slot = createSlot(available, currentWinners[i]);
            machine.appendChild(slot.reel);
            slots.push(slot);
        }

        void machine.offsetWidth; 
        const targetY = -(TOTAL_FAKE_NAMES * SLOT_HEIGHT);

        slots.forEach((slot, index) => {
            const step = drawCount > 1 ? (2.5 / (drawCount - 1)) : 0;
            const duration = 5.5 + (index * step); 
            slot.inner.style.transition = `transform ${duration}s cubic-bezier(0.1, 0.8, 0.1, 1.1)`;
            slot.inner.style.transform = `translateY(${targetY}px)`;
        });

        setTimeout(async () => {
            spinSound.pause();
            currentWinners.forEach(w => winners.push({ prize: prize["獎項"], name: w["姓名"] }));
            renderAllWinners();
            fetch(API_URL, { method: "POST", body: JSON.stringify({ prize: prize["獎項"], winners: currentWinners }) });
            document.getElementById("nextPrizeBtn").disabled = false;
            drawBtn.innerText = "開獎完畢";
        }, 8300); 
    }

    async function resetLottery() {
        if (!confirm("確定要清除雲端所有紀錄重置？")) return;
        await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "reset" }) });
        location.reload();
    }

    document.getElementById("nextPrizeBtn").addEventListener("click", prepareNextPrize);
    document.getElementById("drawBtn").addEventListener("click", drawLottery);
    document.getElementById("resetBtn").addEventListener("click", resetLottery);
    init();
</script>
</body>
</html>
